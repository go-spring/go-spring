# Disable Go-Spring's built-in HTTP server so the go-zero rest.Server owns
# the listening port through the GreetServer adapter (internal/server).
spring.http.server.enabled=false

# go-zero rest settings, bound into config.Config via the "${greet}" prefix.
# These replace the fields that used to live in etc/greet-api.yaml.
greet.name=greet-api
greet.host=0.0.0.0
greet.port=8888
