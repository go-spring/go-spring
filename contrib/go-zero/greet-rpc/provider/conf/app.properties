# The built-in HTTP server is disabled so the provider exposes only the zrpc
# endpoint below. Without this, gs.Run() would try to bind an HTTP listener on
# the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# zrpc (gRPC) server bind address + service name. The Config struct in
# provider/server.go reads these via the ${spring.zrpc.server} prefix.
#
# Note: unlike the other contrib examples, this cannot go through go-zero's
# REST server. rest.Server has no built-in service discovery — the whole
# registry story lives in go-zero's zrpc (gRPC) stack.
spring.zrpc.server.name=greet-rpc
spring.zrpc.server.listen-on=0.0.0.0:8081

# etcd registry address; the provider registers spring.zrpc.server.listen-on
# under spring.zrpc.server.etcd.key here on startup, and the consumer
# resolves that same key to discover the provider. Matches docker-compose.yml.
spring.zrpc.server.etcd.addr=127.0.0.1:2379
spring.zrpc.server.etcd.key=greet.rpc

# ── Observability (PROVIDER-ONLY) ─────────────────────────────────────────────
# go-zero wires all three pillars natively inside zrpc.MustNewServer via
# ServiceConf.SetUp(); we only populate the config below. The consumer is a
# raw zrpc.MustNewClient client and stays un-instrumented, mirroring the
# dubbo-go precedent and the sibling greet-api.

# Tracing → OTel → Jaeger over OTLP/gRPC (docker-compose.yml, 4317). Sampler=1.0
# so a single smoke-test call is guaranteed to produce a span in Jaeger (16686).
spring.zrpc.server.tracing.endpoint=127.0.0.1:4317
spring.zrpc.server.tracing.sampler=1.0
spring.zrpc.server.tracing.batcher=otlpgrpc
spring.zrpc.server.tracing.disabled=false

# Metrics: go-zero's DevServer exposes Prometheus /metrics on this port. The
# zrpc prometheus interceptor records rpc_server_requests_* there.
# Prometheus (docker-compose.yml) scrapes host.docker.internal:6060.
spring.zrpc.server.metrics.enabled=true
spring.zrpc.server.metrics.port=6060
spring.zrpc.server.metrics.path=/metrics

# Logging: provider/logbridge.go installs a logx.SetWriter that forwards go-zero
# framework log entries into go-spring's log module, so logx no longer emits
# files itself — .mode/.encoding/.path are inert post-bridge and are omitted.
# Only .log.level is still meaningful: logx filters by level *before* handing
# the entry to the bridge Writer, so keep it in sync with the root logger below.
spring.zrpc.server.log.level=info

# go-spring log sink. The logx bridge (see provider/logbridge.go) forwards
# go-zero's framework logs into go-spring's log module; this root FileLogger is
# the appender that actually writes them as JSON to ../logs/provider.log, which
# Promtail tails and ships to Loki. Without it the bridged lines would fall back
# to go-spring's default console logger and never reach the file pipeline.
logging.logger.root.type=FileLogger
logging.logger.root.level=INFO
logging.logger.root.dir=../logs
logging.logger.root.file=provider.log
logging.logger.root.layout.type=JSONLayout
