# The Go-Spring built-in HTTP server is disabled so the provider exposes only
# the go-zero rest.Server registered in provider/server.go. Without this,
# gs.Run() would try to bind its own HTTP listener on the default port and
# complain that no handlers are registered.
spring.http.server.enabled=false

# go-zero rest.Server bind address + service name. The Config struct in
# provider/server.go reads these via the ${spring.rest.server} prefix + name /
# host / port fields.
#
# Note: like the sibling greet-api this example carries no etcd config. WS
# rides on the same rest.Server, which has no built-in service discovery —
# the whole registry story lives in go-zero's zRPC (gRPC) stack. The consumer
# talks to this host:port directly via ws://.
spring.rest.server.name=greet-ws
spring.rest.server.host=0.0.0.0
spring.rest.server.port=8890

# ── Observability (PROVIDER-ONLY) ─────────────────────────────────────────────
# go-zero wires all three pillars natively inside rest.MustNewServer via
# ServiceConf.SetUp(); we only populate the config below. The consumer is a
# raw gorilla/websocket client and stays un-instrumented, mirroring the
# greet-api / dubbo-go precedent. WS is served by the same rest.Server as
# HTTP, so the observability wiring is identical to greet-api's.

# Tracing → OTel → Jaeger over OTLP/gRPC (docker-compose.yml, 4317). Sampler=1.0
# so a single smoke-test call is guaranteed to produce a span in Jaeger (16686).
spring.rest.server.tracing.endpoint=127.0.0.1:4317
spring.rest.server.tracing.sampler=1.0
spring.rest.server.tracing.batcher=otlpgrpc
spring.rest.server.tracing.disabled=false

# Metrics: go-zero's DevServer exposes Prometheus /metrics on this port. The
# rest.Server Prometheus middleware records http_server_requests_* there —
# note that for WS the request metric is only recorded on connection close,
# whereas go_* process metrics from the same registry are always live.
# Prometheus (docker-compose.yml) scrapes host.docker.internal:6060.
spring.rest.server.metrics.enabled=true
spring.rest.server.metrics.port=6060
spring.rest.server.metrics.path=/metrics

# Logging: provider/logbridge.go installs a logx.SetWriter that forwards go-zero
# framework log entries into go-spring's log module, so logx no longer emits
# files itself — .mode/.encoding/.path are inert post-bridge and are omitted.
# Only .log.level is still meaningful: logx filters by level *before* handing
# the entry to the bridge Writer, so keep it in sync with the root logger below.
spring.rest.server.log.level=info

# go-spring log sink. The logx bridge (see provider/logbridge.go) forwards
# go-zero's framework logs into go-spring's log module; this root FileLogger is
# the appender that actually writes them as JSON to ../logs/provider.log, which
# Promtail tails and ships to Loki. Without it the bridged lines would fall back
# to go-spring's default console logger and never reach the file pipeline.
logging.logger.root.type=FileLogger
logging.logger.root.level=INFO
logging.logger.root.dir=../logs
logging.logger.root.file=provider.log
logging.logger.root.layout.type=JSONLayout
