# The Go-Spring built-in HTTP server is disabled so the provider exposes only
# the go-zero rest.Server registered in provider/server.go. Without this,
# gs.Run() would try to bind its own HTTP listener on the default port and
# complain that no handlers are registered.
spring.http.server.enabled=false

# go-zero rest.Server bind address + service name. The Config struct in
# provider/server.go reads these via the ${spring.rest.server} prefix + name /
# host / port fields.
#
# Note: like the sibling greet-api this example carries no etcd config. WS
# rides on the same rest.Server, which has no built-in service discovery —
# the whole registry story lives in go-zero's zRPC (gRPC) stack. The consumer
# talks to this host:port directly via ws://.
spring.rest.server.name=greet-ws
spring.rest.server.host=0.0.0.0
spring.rest.server.port=8890
