# Consumer (client-role) configuration. The provider and consumer no longer
# share one file: each owns conf/app.properties under its own directory.

# The consumer runs server-less: gs.Run() only drives the container lifecycle so
# the client can read this config. Without disabling the HTTP server, gs.Run()
# would try to bind a listener on the default port and complain that no handlers
# are registered.
spring.http.server.enabled=false

# Provider base URL. Unlike the sibling greet-rpc there is no etcd hop:
# rest.Server has no built-in service discovery, so the consumer POSTs to this
# host:port directly and asserts on the JSON body.
gozero.consumer.endpoint=http://127.0.0.1:8888
