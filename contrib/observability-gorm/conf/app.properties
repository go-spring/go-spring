# This demo does not serve HTTP; it runs a one-shot Runner at startup.
spring.application.name=obs-gorm-demo

# No web server: the app is a startup Runner, not a service.
spring.http.server.enabled=false

# Single GORM MySQL client (group keyed by instance name "primary"). Its newClient
# unconditionally installs the otel plugin; whether it emits depends purely on
# whether starter-otel put a real provider into the OTel globals.
spring.gorm.mysql.primary.user=root
spring.gorm.mysql.primary.password=root
spring.gorm.mysql.primary.addr=127.0.0.1:3306
spring.gorm.mysql.primary.db=obs
spring.gorm.mysql.primary.parseTime=true

# Unified observability: importing starter-otel + this config is the entire wiring.
# Both signals go to the collector's OTLP/gRPC ingress on :4317.
spring.observability.enable=true
spring.observability.service-name=obs-gorm-demo

spring.observability.trace.enable=true
spring.observability.trace.exporter=otlp-grpc
spring.observability.trace.endpoint=127.0.0.1:4317
spring.observability.trace.insecure=true
spring.observability.trace.sampler-ratio=1.0

spring.observability.metrics.enable=true
spring.observability.metrics.exporter=otlp-grpc
spring.observability.metrics.endpoint=127.0.0.1:4317
spring.observability.metrics.insecure=true
spring.observability.metrics.interval=2s
