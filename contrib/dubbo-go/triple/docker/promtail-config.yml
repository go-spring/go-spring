# Promtail config for the dubbo-go Triple (gRPC/HTTP2) example.
#
# The provider/consumer run on the host and write structured JSON logs into
# ./logs (bind-mounted here at /var/log/app by docker-compose.yml). Promtail
# tails those files and pushes them to Loki, so both processes' logs become
# queryable through Loki's HTTP API (see README).
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: triple-demo
    static_configs:
      - targets: ["localhost"]
        labels:
          job: triple-demo
          __path__: /var/log/app/*.log
