# Consumer (client-role) configuration. The provider and consumer no longer
# share one file: each owns conf/app.properties under its own directory, so
# their metrics ports and log files differ by static config instead of runtime
# env-var overrides.

# The built-in HTTP server is disabled so the consumer runs server-less. Without
# this, gs.Run() would try to bind an HTTP listener on the default port.
spring.http.server.enabled=false

# ── Application identity ──────────────────────────────────────────────────────
# Required by starter-dubbo's observability: it becomes dubbo-go's application
# name (its metrics dimension and registry identity). Without it, wiring the
# shared Observability bean fails at startup.
spring.dubbo.application.name=jsonrpc-demo

# ── Registries (single source of truth) ──────────────────────────────────────
# Registries are defined once, only here under ${spring.dubbo.registries}. The
# map key is a logical registry ID; the type defaults to the key when no
# `protocol` is given (so `etcdv3` here means an etcd-v3 registry with ID
# "etcdv3"). The client role never defines registries inline — it references
# these by ID via ${...registry-ids}. With one registry defined and no
# registry-ids set, the client discovers through it by default. Matches
# docker-compose.yml.
spring.dubbo.registries.etcdv3.address=127.0.0.1:2379

# ── Consumer (client role) ───────────────────────────────────────────────────
# The presence of ${spring.dubbo.client} is what makes starter-dubbo build the
# default client bean (__default__) the consumer autowires. Protocol matches the
# provider's JSON-RPC (HTTP/1.1 + JSON body). No registry-ids set, so it uses
# every registry.
spring.dubbo.client.protocol=jsonrpc

# ── Observability: metrics (Prometheus) ──────────────────────────────────────
# Built into starter-dubbo (see NewInstance in config.go); on by default. The
# consumer exposes its Prometheus endpoint on :9091 — a different port from the
# provider's :9090, so both can run on one host (two processes cannot bind the
# same port). Prometheus (docker-compose.yml) only scrapes the provider, so this
# endpoint is here for parity/manual inspection rather than an active scrape
# target.
spring.dubbo.metrics.enable=true
spring.dubbo.metrics.port=9091
spring.dubbo.metrics.path=/metrics

# ── Observability: tracing (OTel → Jaeger over OTLP/gRPC) ─────────────────────
# dubbo-go's OTel integration exports spans to the Jaeger all-in-one collector
# (docker-compose.yml) over OTLP/gRPC on 127.0.0.1:4317. insecure=true because
# the local collector speaks plaintext; mode=always+ratio=1.0 samples every span
# so a single smoke-test call is guaranteed to show up in the Jaeger UI (16686).
spring.dubbo.tracing.enable=true
spring.dubbo.tracing.exporter=otlp-grpc
spring.dubbo.tracing.endpoint=127.0.0.1:4317
spring.dubbo.tracing.insecure=true
spring.dubbo.tracing.propagator=w3c
spring.dubbo.tracing.mode=always
spring.dubbo.tracing.ratio=1.0

# ── Observability: logging (JSON file → Promtail → Loki) ──────────────────────
# go-spring's log module writes structured JSON lines to ../logs/consumer.log.
# The process runs with its working directory set to this consumer/ directory
# (see main.go), so ../logs resolves to the module-root logs/ that Promtail
# (docker-compose.yml) tails and ships to Loki (3100). The provider writes
# provider.log into the same directory, so the two never interleave.
logging.logger.root.type=FileLogger
logging.logger.root.level=INFO
logging.logger.root.dir=../logs
logging.logger.root.file=consumer.log
logging.logger.root.layout.type=JSONLayout
