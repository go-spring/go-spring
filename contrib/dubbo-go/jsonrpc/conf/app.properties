# The built-in HTTP server is disabled so the provider exposes only the
# JSON-RPC endpoint below. Without this, gs.Run() would try to bind an HTTP
# listener on the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# JSON-RPC (HTTP/1.1 + JSON body) bind port. The Config struct in
# provider/server.go reads this via the ${spring.dubbo.server} prefix + `port`
# field, defaulting to 20002 so this module can coexist with the Triple
# (20000) and classic-Dubbo (20001) siblings on the same host.
spring.dubbo.server.port=20002

# etcd registry address. The provider publishes com.example.GreetService here
# on startup; the consumer resolves a live provider address from the same
# registry instead of dialing a hard-coded host:port. Matches docker-compose.yml.
spring.dubbo.server.registry.etcd=127.0.0.1:2379
