# The built-in HTTP server is disabled so the provider exposes only the Dubbo
# endpoint below, and the consumer runs server-less. Without this, gs.Run()
# would try to bind an HTTP listener on the default port.
spring.http.server.enabled=false

# ── Application identity ──────────────────────────────────────────────────────
# Required by starter-dubbo's observability: it becomes dubbo-go's application
# name (its metrics dimension and registry identity). Without it, wiring the
# shared Observability bean fails at startup.
spring.dubbo.application.name=dubbo-demo

# ── Registries (single source of truth) ──────────────────────────────────────
# Registries are defined once, only here under ${spring.dubbo.registries}. The
# map key is a logical registry ID; the type defaults to the key when no
# `protocol` is given (so `etcdv3` here means an etcd-v3 registry with ID
# "etcdv3"). Roles never define registries inline — they reference these by ID
# via ${...registry-ids}. With one registry defined, neither role sets
# registry-ids, so both the provider (server) and consumer (client) use it by
# default. Matches docker-compose.yml.
spring.dubbo.registries.etcdv3.address=127.0.0.1:2379

# ── Provider (server role) ───────────────────────────────────────────────────
# Protocol listener, map-driven under ${spring.dubbo.server.protocols}: the key
# is the dubbo-go protocol name. Classic Dubbo (TCP + Hessian2) on port 20001,
# chosen so this module can coexist with the Triple sibling (20000) on one host.
# No ${spring.dubbo.server.registry-ids} is set, so the server publishes
# com.example.GreetService into every registry defined above (just etcd here).
spring.dubbo.server.protocols.dubbo.port=20001

# ── Consumer (client role) ───────────────────────────────────────────────────
# The presence of ${spring.dubbo.client} is what makes starter-dubbo build the
# default client bean (__default__) the consumer autowires. Protocol matches the
# provider's classic Dubbo above. No registry-ids set, so it uses every registry.
spring.dubbo.client.protocol=dubbo
