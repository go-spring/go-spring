# The built-in HTTP server is disabled so the provider exposes only the Dubbo
# endpoint below, and the consumer runs server-less. Without this, gs.Run()
# would try to bind an HTTP listener on the default port.
spring.http.server.enabled=false

# ── Global registries (shared across roles) ──────────────────────────────────
# Map-driven under ${spring.dubbo.registries}. The map key is a logical registry
# ID; the registry type defaults to the key when no `protocol` is given (so
# `etcdv3` here means an etcd-v3 registry with ID "etcdv3"). Both the provider
# (server role) and the consumer (client role) resolve their registry from this
# block via role-first/global-fallback: neither sets a role-specific registries
# map, so both fall back here. Matches docker-compose.yml.
spring.dubbo.registries.etcdv3.address=127.0.0.1:2379

# ── Provider (server role) ───────────────────────────────────────────────────
# Protocol listener, map-driven under ${spring.dubbo.server.protocols}: the key
# is the dubbo-go protocol name. Classic Dubbo (TCP + Hessian2) on port 20001,
# chosen so this module can coexist with the Triple sibling (20000) on one host.
# No ${spring.dubbo.server.registries} is set, so the server falls back to the
# global block above and publishes com.example.GreetService into that etcd.
spring.dubbo.server.protocols.dubbo.port=20001
