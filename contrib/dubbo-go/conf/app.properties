# The built-in HTTP server is disabled so the provider exposes only the Dubbo
# endpoint below. Without this, gs.Run() would try to bind an HTTP listener on
# the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# Dubbo triple server bind port. The Config struct in provider/server.go reads
# this via the ${spring.dubbo.server} prefix + `port` field, defaulting to 20000.
spring.dubbo.server.port=20000

# etcd registry address. The provider publishes greet.GreetService here on
# startup; the consumer resolves a live provider address from the same registry
# instead of dialing a hard-coded host:port. Matches docker-compose.yml.
spring.dubbo.server.registry.etcd=127.0.0.1:2379
