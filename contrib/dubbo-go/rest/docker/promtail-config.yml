# Promtail config for the dubbo-go REST (HTTP/1.1 + go-restful) example.
#
# The provider runs on the host and writes structured JSON logs into ./logs
# (bind-mounted here at /var/log/app by docker-compose.yml). Promtail tails
# those files and pushes them to Loki, so provider logs become queryable
# through Loki's HTTP API (see README).
#
# Only the provider writes logs: the raw dubbo-go consumer is not instrumented
# (starter-dubbo's client has no REST protocol support), so provider.log is the
# sole file under ./logs on this module.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: rest-demo
    static_configs:
      - targets: ["localhost"]
        labels:
          job: rest-demo
          __path__: /var/log/app/*.log
