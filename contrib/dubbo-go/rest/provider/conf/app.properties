# Provider (server-role) configuration. The provider and consumer no longer
# share one file: each owns conf/app.properties under its own directory. Unlike
# the triple/dubbo/jsonrpc siblings, starter-dubbo's client bean has no REST
# protocol support, so the consumer runs a raw dubbo-go client for the RPC
# itself; its conf only feeds the gs container and the client's registry
# address. Observability below is therefore PROVIDER-ONLY.

# The built-in HTTP server is disabled so the provider exposes only the REST
# endpoint below. Without this, gs.Run() would try to bind an HTTP listener on
# the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# ── Application identity ──────────────────────────────────────────────────────
# Required by starter-dubbo's observability: it becomes dubbo-go's application
# name (its metrics dimension and registry identity). Without it, wiring the
# shared Observability bean fails at startup.
spring.dubbo.application.name=rest-demo

# ── Registries (single source of truth) ──────────────────────────────────────
# etcd registry, defined once at the top level under ${spring.dubbo.registries}:
# the map key is a logical registry ID (type defaults to the key). The provider
# publishes com.example.GreetService here on startup; the raw consumer resolves
# a live provider address from the same registry instead of dialing a hard-coded
# host:port. With only one registry defined, the server publishes into it by
# default (no registry-ids needed). Matches docker-compose.yml.
spring.dubbo.registries.etcdv3.address=127.0.0.1:2379

# ── Provider (server role) ───────────────────────────────────────────────────
# Protocol listener, map-driven under ${spring.dubbo.server.protocols}: the key
# is the dubbo-go protocol name and only configured protocols are enabled. REST
# (HTTP/1.1 + go-restful) on port 20003, chosen so this module can coexist with
# the Triple (20000), classic-Dubbo (20001) and JSON-RPC (20002) siblings on the
# same host.
spring.dubbo.server.protocols.rest.port=20003

# ── Observability: metrics (Prometheus) ──────────────────────────────────────
# Built into starter-dubbo (see NewInstance in config.go); on by default. The
# server exposes a Prometheus scrape endpoint on this port/path, independent of
# the disabled ${spring.http.server}. Prometheus (docker-compose.yml) scrapes it
# at host.docker.internal:9090.
spring.dubbo.metrics.enable=true
spring.dubbo.metrics.port=9090
spring.dubbo.metrics.path=/metrics

# ── Observability: tracing (OTel → Jaeger over OTLP/gRPC) ─────────────────────
# dubbo-go's OTel integration exports spans to the Jaeger all-in-one collector
# (docker-compose.yml) over OTLP/gRPC on 127.0.0.1:4317. insecure=true because
# the local collector speaks plaintext; mode=always+ratio=1.0 samples every span
# so a single smoke-test call is guaranteed to show up in the Jaeger UI (16686).
spring.dubbo.tracing.enable=true
spring.dubbo.tracing.exporter=otlp-grpc
spring.dubbo.tracing.endpoint=127.0.0.1:4317
spring.dubbo.tracing.insecure=true
spring.dubbo.tracing.propagator=w3c
spring.dubbo.tracing.mode=always
spring.dubbo.tracing.ratio=1.0

# ── Observability: logging (JSON file → Promtail → Loki) ──────────────────────
# go-spring's log module writes structured JSON lines to ../logs/provider.log.
# The process runs with its working directory set to this provider/ directory
# (see main.go), so ../logs resolves to the module-root logs/ that Promtail
# (docker-compose.yml) tails and ships to Loki (3100). The raw consumer writes
# no file logs (it is not instrumented), so only provider.log appears.
logging.logger.root.type=FileLogger
logging.logger.root.level=INFO
logging.logger.root.dir=../logs
logging.logger.root.file=provider.log
logging.logger.root.layout.type=JSONLayout
