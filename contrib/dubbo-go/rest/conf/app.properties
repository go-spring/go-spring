# The built-in HTTP server is disabled so the provider exposes only the REST
# endpoint below. Without this, gs.Run() would try to bind an HTTP listener on
# the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# Required by starter-dubbo's observability (dubbo-go application name / registry
# identity); wiring the shared Observability bean fails at startup without it.
# Only the provider reads this conf; the consumer is a standalone main().
spring.dubbo.application.name=rest-demo

# Dubbo server wired by the starter-dubbo module. Protocols are map-driven
# under ${spring.dubbo.server.protocols}: the key is the dubbo-go protocol
# name and only configured protocols are enabled. Here the REST
# (HTTP/1.1 + go-restful) protocol on port 20003, chosen so this module can
# coexist with the Triple (20000), classic-Dubbo (20001) and JSON-RPC (20002)
# siblings on the same host.
spring.dubbo.server.protocols.rest.port=20003

# etcd registry, defined once at the top level under ${spring.dubbo.registries}:
# the map key is a logical registry ID (type defaults to the key). The provider
# publishes com.example.GreetService here on startup; the consumer resolves a
# live provider address from the same registry instead of dialing a hard-coded
# host:port. Roles reference registries by ID via ${...registry-ids}; with only
# one registry defined, neither role sets registry-ids, so both use it by
# default. Matches docker-compose.yml.
spring.dubbo.registries.etcdv3.address=127.0.0.1:2379
