# Consumer (client-role) configuration. The provider and consumer no longer
# share one file: each owns conf/app.properties under its own directory. The
# REST consumer builds its own raw dubbo-go client (see consumer/main.go)
# because starter-dubbo's client bean has no REST protocol support, so this
# conf only feeds the gs container lifecycle and the registry address the raw
# client dials.

# The consumer runs server-less: gs.Run() only drives the container lifecycle
# so the client can read this config. Without disabling the HTTP server,
# gs.Run() would try to bind an HTTP listener on the default port and complain
# that no handlers are registered.
spring.http.server.enabled=false

# etcd registry address. The consumer resolves a live provider address from the
# same registry the provider published into, instead of dialing a hard-coded
# host:port. Matches docker-compose.yml.
dubbo.consumer.registry.etcd=127.0.0.1:2379
