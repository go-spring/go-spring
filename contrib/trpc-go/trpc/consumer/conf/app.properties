# Consumer (client-role) configuration. The provider and consumer each own
# conf/app.properties under their own directory.

# The consumer runs server-less: gs.Run() only drives the container lifecycle so
# the client can read this config. Without disabling the HTTP server, gs.Run()
# would try to bind a listener on the default port and complain that no handlers
# are registered.
spring.http.server.enabled=false

# Target address of the provider, dialed directly via the "ip://" scheme (no
# service registry in this first example). Host:port must match the provider's
# ${spring.trpc.server.addr}.
spring.trpc.consumer.target=ip://127.0.0.1:8000
