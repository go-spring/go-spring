# Consumer (client-role) configuration for the etcd registry example.

# The built-in HTTP server is disabled so the consumer runs server-less.
spring.http.server.enabled=false

# Application identity: required by starter-dubbo.
spring.dubbo.application.name=greet-etcd

# ── Registry ──────────────────────────────────────────────────────────────────
# The client references the same registry the provider published into. etcdv3 is
# dubbo-go's etcd-v3 driver. Matches docker-compose.yml.
spring.dubbo.registries.etcd.protocol=etcdv3
spring.dubbo.registries.etcd.address=127.0.0.1:2379

# ── Consumer (client role) ────────────────────────────────────────────────────
# The presence of ${spring.dubbo.client} makes starter-dubbo build the default
# client bean the consumer autowires. Protocol matches the provider's Triple.
spring.dubbo.client.protocol=tri
