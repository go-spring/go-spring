# Provider (server-role) configuration for the Consul registry example.

# The built-in HTTP server is disabled so the provider exposes only the Kitex
# endpoint below.
spring.http.server.enabled=false

# Kitex server bind address. Unlike the etcd example this must be a CONCRETE
# host:port (not a wildcard like :8888): Consul registers exactly this address
# and health-checks it over TCP, so 0.0.0.0 would never pass the check.
# The provider was generated from a protobuf IDL, so this single port serves
# both KitexProtobuf and gRPC; the consumer selects the transport per call.
spring.kitex.server.addr=127.0.0.1:8888

# Service name registered into Consul. The consumer resolves the provider by
# this name; the two sides must agree.
spring.kitex.server.service.name=echo

# Consul agent HTTP address. The provider publishes the echo service here on
# startup; the consumer resolves a live provider address from the same registry
# instead of dialing a hard-coded host:port. Matches docker-compose.yml.
#
# NOTE: starter-kitex only knows how to build an etcd registry, so unlike the
# etcd example this example wires the Consul registry itself in
# provider/server.go rather than through starter-kitex.
spring.kitex.server.registry.consul=127.0.0.1:8500
