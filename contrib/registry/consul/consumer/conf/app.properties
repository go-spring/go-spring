# Consumer (client-role) configuration for the Consul registry example.

# The consumer runs server-less: gs.Run() only drives the container lifecycle so
# the client can read this config.
spring.http.server.enabled=false

# Consul agent HTTP address. The consumer resolves a live provider address from
# the same registry the provider published into. Matches docker-compose.yml.
spring.kitex.consumer.registry.consul=127.0.0.1:8500

# Target Kitex service name. Must match the provider's
# ${spring.kitex.server.service.name}.
spring.kitex.consumer.service.name=echo
