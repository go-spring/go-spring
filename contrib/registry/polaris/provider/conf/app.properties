# Provider (server-role) configuration for the etcd registry example.

# The built-in HTTP server is disabled so the provider exposes only the Dubbo
# endpoint below.
spring.http.server.enabled=false

# Application identity: becomes dubbo-go's application name and registry identity.
spring.dubbo.application.name=greet-polaris

# ── Registry ──────────────────────────────────────────────────────────────────
# Registries are defined once here under ${spring.dubbo.registries}. The map key
# is a logical registry ID; `protocol` selects the registry type. etcdv3 is
# dubbo-go's etcd-v3 driver. The server references it by default (no registry-ids
# set means "publish into every registry defined"). Matches docker-compose.yml.
spring.dubbo.registries.polaris.protocol=polaris
spring.dubbo.registries.polaris.address=127.0.0.1:8091

# ── Provider (server role) ────────────────────────────────────────────────────
# Triple (protobuf-over-HTTP/2) listener on port 20000.
spring.dubbo.protocols.tri.port=20000
