# The built-in Go-Spring HTTP server is disabled so the goframe *ghttp.Server
# contributed by starter-goframe/ws owns the listening port. Without this,
# gs.Run() would try to bind an HTTP listener on the default port and complain
# that no handlers are registered.
spring.http.server.enabled=false

# goframe WebSocket server settings, bound by starter-goframe/ws from the
# ${spring.goframe.ws.server} prefix. Because a WebSocket connection starts life
# as an HTTP GET whose Upgrade header the server rewrites, these settings play
# exactly the same role as a stock goframe HTTP "server:" section — the transport
# differs, the listener does not (and they replace the deleted provider/server.go).

# HTTP bind address for the goframe *ghttp.Server that hosts the /echo upgrade
# route. Unique across sibling subprojects so they can coexist.
spring.goframe.ws.server.address=:8002

# Service name the provider registers under. The consumer looks this same name
# up in etcd, then dials ws://<host>:<port>/echo.
spring.goframe.ws.server.name=goframe.websocket.echo

# etcd registry address. The provider publishes goframe.websocket.echo here on
# startup; the consumer resolves a live provider address from the same registry.
# Leave empty for a plain server clients dial directly. Matches docker-compose.yml.
spring.goframe.ws.server.registry.etcd=127.0.0.1:2379

# go-spring log sink. The starter bridges goframe's framework logs (glog) into
# go-spring's log module; this root FileLogger is the appender that actually
# writes them as JSON to ../logs/provider.log, which Promtail tails and ships to
# Loki. Without it the bridged lines would fall back to go-spring's default
# console logger and never reach the file pipeline.
logging.logger.root.type=FileLogger
logging.logger.root.level=INFO
logging.logger.root.dir=../logs
logging.logger.root.file=provider.log
logging.logger.root.layout.type=JSONLayout
