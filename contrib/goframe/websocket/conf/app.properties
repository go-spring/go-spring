# The built-in Go-Spring HTTP server is disabled so the goframe *ghttp.Server
# owns the listening port through the GoFrameServer adapter (internal/server).
# Without this, gs.Run() would try to bind an HTTP listener on the default port
# and complain that no handlers are registered.
spring.http.server.enabled=false

# goframe WebSocket server settings, bound into config.Config via the
# "${goframe.websocket}" prefix. Because a WebSocket connection starts life as
# an HTTP GET whose Upgrade header the server rewrites, these settings play
# exactly the same role as the "server:" section of a stock goframe HTTP
# project — the transport differs, the listener does not.

# HTTP bind address for the goframe *ghttp.Server that hosts the /echo
# upgrade route. Unique across sibling subprojects so they can coexist.
goframe.websocket.address=:8002

# Service name the provider registers under. The consumer looks this same name
# up in etcd instead of dialing a hard-coded host:port, then dials ws://<host>:<port>/echo.
goframe.websocket.name=goframe.websocket.echo

# etcd registry address. The provider publishes goframe.websocket.echo here on
# startup; the consumer resolves a live provider address from the same
# registry. Matches docker-compose.yml.
goframe.websocket.registry.etcd=127.0.0.1:2379
