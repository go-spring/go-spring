# Prometheus scrape config for the goframe HTTP example.
#
# The provider is NOT a container: scripts/smoke-test.sh builds and runs it on
# the host, where goframe serves the Prometheus endpoint on :8000/metrics (the
# same port as the HTTP service, bound outside the response-wrapping group). From
# inside this container the host is reachable as host.docker.internal (mapped via
# docker-compose.yml's extra_hosts on Linux; native on macOS/Windows).
#
# A short scrape_interval keeps the smoke test / manual verification snappy.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: goframe-provider
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: goframe-http
          role: provider
