# The built-in Go-Spring HTTP server is disabled so the goframe *ghttp.Server
# contributed by starter-goframe/http owns the listening port. Without this,
# gs.Run() would try to bind an HTTP listener on the default port and complain
# that no handlers are registered.
spring.http.server.enabled=false

# goframe HTTP server settings, bound by starter-goframe/http from the
# ${spring.goframe.http.server} prefix. These replace the "server:" section of a
# stock goframe manifest/config/config.yaml (and the deleted provider/server.go).

# HTTP bind address for the goframe *ghttp.Server.
spring.goframe.http.server.address=:8000

# Service name the provider registers under. The consumer looks this same name
# up in etcd instead of dialing a hard-coded host:port.
spring.goframe.http.server.name=goframe.hello

# etcd registry address. The provider publishes goframe.hello here on startup;
# the consumer resolves a live provider address from the same registry. Leave
# empty for a plain server clients dial directly. Matches docker-compose.yml.
spring.goframe.http.server.registry.etcd=127.0.0.1:2379

# Metrics: the starter exposes goframe's native OTel Prometheus (pull) endpoint
# on this same :8000 server, outside the response-wrapping group so the
# exposition stays valid Prometheus text. Prometheus (docker-compose.yml) scrapes
# host.docker.internal:8000/metrics. This is a goframe-native pipeline, separate
# from starter-otel's metrics (which stay disabled below to avoid a second one).
spring.goframe.http.server.metrics.enabled=true
spring.goframe.http.server.metrics.path=/metrics

# ── Observability ─────────────────────────────────────────────────────────────
# Tracing is deferred to starter-otel (imported for its side effect in
# provider/main.go): it installs the global OpenTelemetry TracerProvider and
# goframe's ghttp auto-instruments every request off it — no per-server wiring,
# replacing the inline contrib/trace/otlphttp block the deleted server.go had.

spring.observability.service-name=goframe.hello

# Spans are exported to Jaeger over OTLP/HTTP (Jaeger's 4318). Every value has a
# default, so the provider still starts when no backend is up (the exporter just
# fails to connect in the background). Matches docker-compose.yml's Jaeger 4318.
spring.observability.trace.exporter=otlp-http
spring.observability.trace.endpoint=127.0.0.1:4318
spring.observability.trace.insecure=true

# Metrics are handled goframe-natively above; disable starter-otel's own metrics
# pipeline so it does not also try to build (and set as global) a MeterProvider.
spring.observability.metrics.exporter=none

# go-spring log sink. The starter bridges goframe's framework logs (glog) into
# go-spring's log module; this root FileLogger is the appender that actually
# writes them as JSON to ../logs/provider.log, which Promtail tails and ships to
# Loki. Without it the bridged lines would fall back to go-spring's default
# console logger and never reach the file pipeline.
logging.logger.root.type=FileLogger
logging.logger.root.level=INFO
logging.logger.root.dir=../logs
logging.logger.root.file=provider.log
logging.logger.root.layout.type=JSONLayout
