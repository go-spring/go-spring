# The built-in Go-Spring HTTP server is disabled so the goframe *ghttp.Server
# owns the listening port through the GoFrameServer adapter (internal/server).
# Without this, gs.Run() would try to bind an HTTP listener on the default port
# and complain that no handlers are registered.
spring.http.server.enabled=false

# goframe server settings, bound into config.Config via the "${goframe}" prefix.
# These replace the "server:" section of manifest/config/config.yaml.

# HTTP bind address for the goframe *ghttp.Server.
goframe.address=:8000

# Service name the provider registers under. The consumer looks this same name
# up in etcd instead of dialing a hard-coded host:port.
goframe.name=goframe.hello

# etcd registry address. The provider publishes goframe.hello here on startup;
# the consumer resolves a live provider address from the same registry. Matches
# docker-compose.yml.
goframe.registry.etcd=127.0.0.1:2379

# ── Observability ─────────────────────────────────────────────────────────────
# All three pillars use goframe's own OTel integration (contrib/trace/otlphttp,
# contrib/metric/otelmetric, glog), wired in provider/server.go. The consumer is
# left uninstrumented, matching the dubbo-go / go-zero examples. Every value has
# a code-side default, so the provider still starts when no backend is up.

# Tracing: spans are exported to Jaeger over OTLP/HTTP. ghttp auto-instruments
# each request once the tracer provider is set. Matches docker-compose.yml's
# Jaeger 4318 mapping.
goframe.tracing.endpoint=127.0.0.1:4318
goframe.tracing.path=/v1/traces

# Metrics: the Prometheus scrape endpoint is served on the goframe HTTP port
# (:8000) under this path, outside the response-wrapping group. Prometheus
# (docker-compose.yml) scrapes host.docker.internal:8000/metrics.
goframe.metrics.path=/metrics

# Logging: glog writes structured JSON lines into ../logs/provider.log. The dir
# resolves relative to provider/ (main.go chdirs there), so ../logs is the
# module-root logs/ that Promtail tails. The consumer, if it logged, would use
# consumer.log so the two never interleave.
goframe.log.dir=../logs
goframe.log.file=provider.log
