# Disable Go-Spring's built-in HTTP server; the provider exposes only the gRPC
# endpoint below. Without this, gs.Run() would try to bind an HTTP listener on
# the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# goframe gRPC server settings, bound by starter-goframe/grpc from the
# ${spring.goframe.grpc.server} prefix. These play the same role as the "grpc:"
# node grpcx would otherwise read from manifest/config/config.yaml via g.Cfg()
# (and replace the deleted provider/server.go).

# gRPC bind address for grpcx.GrpcServer.
spring.goframe.grpc.server.address=:8001

# Service name the provider registers under. The consumer resolves this same
# name from etcd instead of dialing a hard-coded host:port.
spring.goframe.grpc.server.name=goframe.grpc.echo

# etcd registry address. The provider publishes goframe.grpc.echo here on
# startup; the consumer resolves a live provider address from the same registry.
# Leave empty for a plain server clients dial directly. Matches docker-compose.yml.
spring.goframe.grpc.server.registry.etcd=127.0.0.1:2379

# go-spring log sink. The starter bridges goframe's framework logs (glog) into
# go-spring's log module; this root FileLogger is the appender that actually
# writes them as JSON to ../logs/provider.log, which Promtail tails and ships to
# Loki. Without it the bridged lines would fall back to go-spring's default
# console logger and never reach the file pipeline.
logging.logger.root.type=FileLogger
logging.logger.root.level=INFO
logging.logger.root.dir=../logs
logging.logger.root.file=provider.log
logging.logger.root.layout.type=JSONLayout
