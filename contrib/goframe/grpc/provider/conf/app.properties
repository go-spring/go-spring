# Disable Go-Spring's built-in HTTP server; the provider exposes only the gRPC
# endpoint below. Without this, gs.Run() would try to bind an HTTP listener on
# the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# goframe gRPC server settings, bound into server.Config via the "${goframe.grpc}"
# prefix. These play the same role as the "grpc:" node grpcx would otherwise
# read from manifest/config/config.yaml via g.Cfg().

# gRPC bind address for grpcx.GrpcServer.
goframe.grpc.address=:8001

# Service name the provider registers under. The consumer resolves this same
# name from etcd instead of dialing a hard-coded host:port.
goframe.grpc.name=goframe.grpc.echo

# etcd registry address. The provider publishes goframe.grpc.echo here on
# startup; the consumer resolves a live provider address from the same registry.
# Matches docker-compose.yml.
goframe.grpc.registry.etcd=127.0.0.1:2379
