services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: contrib-goframe-etcd
    command:
      - /usr/local/bin/etcd
      - --name=node1
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "127.0.0.1:2379:2379"
