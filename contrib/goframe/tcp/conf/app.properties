# The built-in Go-Spring HTTP server is disabled so the goframe *gtcp.Server
# owns the listening port through the GoFrameTCPServer adapter
# (internal/server). Without this, gs.Run() would try to bind an HTTP
# listener on the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# goframe raw-TCP server settings, bound into config.Config via the
# "${goframe.tcp}" prefix. Unlike ../http and ../grpc, gtcp has no built-in
# gsvc integration — internal/server registers into etcd by hand around the
# gtcp lifecycle, which is why an explicit AdvertiseHost/AdvertisePort pair
# appears here.

# gtcp.Server bind address. Unique across sibling subprojects so they can
# coexist.
goframe.tcp.address=:8003

# Host:port the provider advertises into etcd. gtcp does not detect a public
# IP for you the way ghttp does; the consumer would fail to dial "0.0.0.0"
# or "" so we name the address clients should connect on. In real deploys
# this is the pod/host IP.
goframe.tcp.advertise.host=127.0.0.1
goframe.tcp.advertise.port=8003

# Service name the provider registers under. The consumer looks this same
# name up in etcd instead of dialing a hard-coded host:port.
goframe.tcp.name=goframe.tcp.echo

# etcd registry address. The provider publishes goframe.tcp.echo here on
# startup; the consumer resolves a live provider address from the same
# registry. Matches docker-compose.yml.
goframe.tcp.registry.etcd=127.0.0.1:2379
