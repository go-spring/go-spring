# The built-in Go-Spring HTTP server is disabled so the goframe *gtcp.Server
# contributed by starter-goframe/tcp owns the listening port. Without this,
# gs.Run() would try to bind an HTTP listener on the default port and complain
# that no handlers are registered.
spring.http.server.enabled=false

# goframe raw-TCP server settings, bound by starter-goframe/tcp from the
# ${spring.goframe.tcp.server} prefix. Unlike http/grpc, gtcp has no built-in
# gsvc integration — the starter registers into etcd by hand around the gtcp
# lifecycle, which is why an explicit advertise host/port pair appears here.

# gtcp.Server bind address. Unique across sibling subprojects so they can coexist.
spring.goframe.tcp.server.address=:8003

# Host:port the provider advertises into etcd. gtcp does not detect a public IP
# for you the way ghttp does; the consumer would fail to dial "0.0.0.0" or "" so
# we name the address clients should connect on. In real deploys this is the
# pod/host IP.
spring.goframe.tcp.server.advertise.host=127.0.0.1
spring.goframe.tcp.server.advertise.port=8003

# Service name the provider registers under. The consumer looks this same name
# up in etcd instead of dialing a hard-coded host:port.
spring.goframe.tcp.server.name=goframe.tcp.echo

# etcd registry address. The provider publishes goframe.tcp.echo here on startup;
# the consumer resolves a live provider address from the same registry. Leave
# empty for a plain TCP server with no registration. Matches docker-compose.yml.
spring.goframe.tcp.server.registry.etcd=127.0.0.1:2379

# go-spring log sink. The starter bridges goframe's framework logs (glog) into
# go-spring's log module; this root FileLogger is the appender that actually
# writes them as JSON to ../logs/provider.log, which Promtail tails and ships to
# Loki. Without it the bridged lines would fall back to go-spring's default
# console logger and never reach the file pipeline.
logging.logger.root.type=FileLogger
logging.logger.root.level=INFO
logging.logger.root.dir=../logs
logging.logger.root.file=provider.log
logging.logger.root.layout.type=JSONLayout
