# Grafana datasource provisioning for the classic stack.
#
# All three backends run as sibling services in this compose network, so they
# are reachable by container name. Prometheus is on its INTERNAL port 9090
# here (the 9099 host mapping is only for browser access from the host).
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
