# Prometheus scrapes the OTel Collector's re-exposed metrics endpoint.
# The collector is the one talking to the host app (host.docker.internal:9090),
# so Prometheus itself does not need any knowledge of the host.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: otel-collector
    scrape_interval: 5s
    static_configs:
      - targets: ['otel-collector:8889']
