apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # In-compose Prometheus still listens on its own 9090; only the host
    # publish port is remapped to 9099 to dodge the host app's 9090.
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
