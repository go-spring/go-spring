services:
  # etcd is the whole reason this example exists: the provider registers the
  # kratos HTTP server under its service name on startup, and the consumer
  # resolves that name to a live address via `discovery:///<name>`.
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: contrib-go-kratos-ws-etcd
    command:
      - /usr/local/bin/etcd
      - --name=node1
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "127.0.0.1:2379:2379"
