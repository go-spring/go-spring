# The built-in HTTP server is disabled so the provider exposes only the kratos
# transport servers below. Without this, gs.Run() would try to bind an HTTP
# listener on the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# Kratos application name. The provider publishes this into etcd; the consumer
# resolves against the same name via `discovery:///<name>`.
spring.kratos.name=kratos-greeter

# Kratos HTTP transport server. Read via the ${spring.kratos.http} prefix by
# the Config struct in provider/server.go.
spring.kratos.http.addr=0.0.0.0:8000
spring.kratos.http.timeout=1s

# Kratos gRPC transport server, bound from ${spring.kratos.grpc}.
spring.kratos.grpc.addr=0.0.0.0:9000
spring.kratos.grpc.timeout=1s

# Kratos WebSocket transport server (kratos-transport/transport/websocket),
# bound from ${spring.kratos.ws}. Runs alongside HTTP+gRPC in the SAME
# kratos.App — the WS server implements transport.Server just like the other
# two, so kratos.App owns its lifecycle and etcd registration for free.
# Chose port 9002 to avoid the kratos HTTP default (:8000) and the gRPC
# default (:9000). Path "/" is where the upgrade handshake is served.
spring.kratos.ws.addr=0.0.0.0:9002
spring.kratos.ws.path=/

# etcd registry address. The provider publishes the kratos.App instance here on
# startup; the consumer resolves a live provider address from the same registry
# instead of dialing a hard-coded host:port. Matches docker-compose.yml.
spring.kratos.registry.etcd=127.0.0.1:2379

# ── Observability ─────────────────────────────────────────────────────────────
# Unlike starter-dubbo (metrics/tracing on by config) or go-zero (native
# ServiceConf), kratos has NO starter: these values feed the hand-wired OTel +
# kratos-middleware setup in provider/observability.go, not a config-only switch.

# Metrics (Prometheus). A standalone HTTP listener (independent of the disabled
# ${spring.http.server}) renders the kratos request counter/latency histogram at
# /metrics. Prometheus (docker-compose.yml) scrapes host.docker.internal:9090.
spring.kratos.metrics.addr=0.0.0.0:9090

# Tracing (OTel → Jaeger over OTLP/gRPC). Spans are pushed to the Jaeger
# all-in-one collector (docker-compose.yml) on 127.0.0.1:4317. insecure=true
# because the local collector speaks plaintext. The tracer samples every span
# (AlwaysSample in observability.go), so even one smoke-test call shows up in
# the Jaeger UI (16686) under service "kratos-greeter".
spring.kratos.tracing.endpoint=127.0.0.1:4317
spring.kratos.tracing.insecure=true

# Logging (JSON file → Promtail → Loki). go-spring's log module writes both the
# handler's business log lines and kratos' own framework logs (bridged via
# provider/logbridge.go) as structured JSON to ../logs/provider.log. The
# provider process chdir's into provider/ (see main.go), so ../logs resolves to
# the module-root logs/ that Promtail (docker-compose.yml) tails and ships to
# Loki (3100).
logging.logger.root.type=FileLogger
logging.logger.root.level=INFO
logging.logger.root.dir=../logs
logging.logger.root.file=provider.log
logging.logger.root.layout.type=JSONLayout
