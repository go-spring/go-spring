# The built-in HTTP server is disabled so the provider exposes only the kratos
# gRPC transport server below. Without this, gs.Run() would try to bind an HTTP
# listener on the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# Kratos gRPC transport server, bound from ${spring.kratos.grpc.server} by
# starter-kratos/grpc. The provider publishes ${...name} into etcd; the consumer
# resolves against the same name via `discovery:///<name>`.
spring.kratos.grpc.server.name=kratos-grpc
spring.kratos.grpc.server.addr=0.0.0.0:9000
spring.kratos.grpc.server.timeout=1s

# etcd registry address. Setting it opts the server into service registration:
# the App publishes {name, endpoints} here on startup and deregisters on stop.
# Leave empty for a plain direct-connect server. Matches docker-compose.yml.
spring.kratos.grpc.server.etcd.addr=127.0.0.1:2379

# Logging (JSON file). go-spring's log module writes both the handler's business
# log lines and kratos' own framework logs (bridged by starter-kratos) as
# structured JSON to ../logs/provider.log.
logging.logger.root.type=FileLogger
logging.logger.root.level=INFO
logging.logger.root.dir=../logs
logging.logger.root.file=provider.log
logging.logger.root.layout.type=JSONLayout
