# Consumer (client-role) configuration. The provider and consumer no longer
# share one file: each owns conf/app.properties under its own directory.

# The consumer runs server-less: gs.Run() only drives the container lifecycle so
# the client can read this config. Without disabling the HTTP server, gs.Run()
# would try to bind an HTTP listener on the default port and complain that no
# handlers are registered.
spring.http.server.enabled=false

# etcd registry address. The consumer resolves a live provider instance from the
# same registry the provider registered into, instead of dialing a hard-coded
# host:port. Matches docker-compose.yml.
kratos.consumer.registry.etcd=127.0.0.1:2379

# Target kratos service name. Must match the provider's
# ${spring.kratos.grpc.server.name}; the consumer discovers the provider by this
# name via `discovery:///<name>`.
kratos.consumer.service.name=kratos-grpc
