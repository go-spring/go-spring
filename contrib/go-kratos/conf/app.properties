# The built-in HTTP server is disabled so this example exposes only the two
# kratos transport servers below. Without this, gs.Run() would also try to bind
# its own HTTP listener on the default port and complain that no handlers are
# registered.
spring.http.server.enabled=false

# kratos HTTP transport server. The HTTPConfig struct in internal/server/http.go
# reads these via the ${spring.kratos.http} prefix. The self-test client in
# main.go dials the same address.
spring.kratos.http.addr=0.0.0.0:8000
spring.kratos.http.timeout=1s

# kratos gRPC transport server, bound from ${spring.kratos.grpc}.
spring.kratos.grpc.addr=0.0.0.0:9000
spring.kratos.grpc.timeout=1s
