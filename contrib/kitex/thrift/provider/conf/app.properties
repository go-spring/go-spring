# The built-in HTTP server is disabled so the provider exposes only the Kitex
# endpoint below. Without this, gs.Run() would try to bind an HTTP listener on
# the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# Kitex server bind address. starter-kitex's Config reads this via the
# ${spring.kitex.server} prefix + `addr` field, defaulting to :8888.
spring.kitex.server.addr=:8888

# Service name registered into etcd. The consumer resolves the provider by this
# name; the two sides must agree.
spring.kitex.server.service.name=echo

# etcd registry address. The provider publishes the echo service here on
# startup; the consumer resolves a live provider address from the same registry
# instead of dialing a hard-coded host:port. Matches docker-compose.yml.
spring.kitex.server.registry.etcd=127.0.0.1:2379

# Append server.WithCompatibleMiddlewareForUnary, which Kitex's thrift codegen
# adds in its generated NewServer. starter-kitex leaves this off by default
# (protobuf codegen omits it), so thrift services must enable it explicitly.
spring.kitex.server.compatible-unary-middleware=true

# ── Observability: tracing (OTel → Jaeger over OTLP/gRPC) ─────────────────────
# starter-kitex installs obs-opentelemetry's tracing.NewServerSuite() and exports
# spans to the Jaeger all-in-one collector (docker-compose.yml) over OTLP/gRPC on
# 127.0.0.1:4317. insecure=true because the local collector speaks plaintext. The
# OTel meter is disabled inside starter-kitex, so metrics come from Prometheus
# below rather than a second OTel pipeline.
spring.kitex.server.tracing.enable=true
spring.kitex.server.tracing.endpoint=127.0.0.1:4317
spring.kitex.server.tracing.insecure=true

# ── Observability: metrics (Prometheus) ──────────────────────────────────────
# starter-kitex adds monitor-prometheus's server tracer, which stands up its own
# HTTP server on this port/path (independent of the disabled spring.http.server).
# Prometheus (docker-compose.yml) scrapes it at host.docker.internal:9090.
spring.kitex.server.metrics.enable=true
spring.kitex.server.metrics.port=9090
spring.kitex.server.metrics.path=/metrics

# ── Observability: logging (JSON file → Promtail → Loki) ──────────────────────
# starter-kitex backs kitex's global klog with the obs-opentelemetry logrus
# adapter, writing JSON lines (with trace_id/span_id from the request context) to
# ../logs/provider.log. The process runs with its working directory set to this
# provider/ directory (see main.go), so ../logs resolves to the module-root logs/
# that Promtail (docker-compose.yml) tails and ships to Loki (3100).
spring.kitex.server.logging.enable=true
spring.kitex.server.logging.dir=../logs
spring.kitex.server.logging.file=provider.log
spring.kitex.server.logging.level=info
