# The built-in HTTP server is disabled so this example exposes only the
# Kitex endpoint below. Without this, gs.Run() would try to bind an HTTP
# listener on the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# Kitex server bind address. The Config struct in server.go reads this via
# the ${spring.kitex.server} prefix + `addr` field, defaulting to :8888.
# The self-test client in main.go dials the same port.
spring.kitex.server.addr=:8888
