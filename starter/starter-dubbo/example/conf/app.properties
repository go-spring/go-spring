# The built-in HTTP server is disabled so this example exposes only the
# Dubbo endpoint below. Without this, gs.Run() would try to bind an HTTP
# listener on the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# The application name is required: the shared dubbo Instance uses it as the
# metrics/registry identity, so starter-dubbo fails fast if it is missing.
spring.dubbo.application.name=greet-example

# Registries are the single top-level source of truth and are now mandatory:
# starter-dubbo only creates Dubbo components (server/clients) when at least one
# registry is defined here, and every entry must carry an address. This example
# points at a local etcd; bring one up (e.g. etcd on 127.0.0.1:2379) before
# running, or swap in your own registry (nacos/zookeeper/...).
spring.dubbo.registries.etcd.protocol=etcdv3
spring.dubbo.registries.etcd.address=127.0.0.1:2379

# Dubbo protocols are map-driven under ${spring.dubbo.server.protocols}: the
# key is the dubbo-go protocol name and only configured protocols are enabled.
# Here a single Triple listener on port 20000; the self-test client in
# example.go dials the same port. Omitting all protocols would fall back to
# this same Triple:20000 default.
spring.dubbo.server.protocols.tri.port=20000

# Observability is built in and on by default: Prometheus metrics are exposed
# on http://127.0.0.1:9090/metrics and OTel traces are printed to stdout.
# Override or disable them under ${spring.dubbo.metrics} / ${spring.dubbo.tracing}.
