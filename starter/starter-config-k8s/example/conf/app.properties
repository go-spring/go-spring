spring.app.name=config-k8s-example

# Import configuration straight from a Kubernetes ConfigMap via the "k8s"
# provider. Source form: <kind>/<name>[?namespace=..&key=..&format=..&kubeconfig=..]
#
#   optional:k8s:configmap/app-config?namespace=default&key=application.yaml
#
# "optional:" lets the app boot even when no cluster is reachable (local runs):
# the read is skipped and bound fields fall back to their defaults. In-cluster
# the ConfigMap is read at startup and watched via an informer, so edits
# hot-reload bound gs.Dync fields within seconds.
#
# For a Secret instead, use k8s:secret/<name>. To run out-of-cluster against a
# real cluster, add &kubeconfig=/home/me/.kube/config and drop "optional:".
spring.app.imports=optional:k8s:configmap/app-config?namespace=default&key=application.yaml

# This example only exercises the config provider, so the default main HTTP
# server is disabled to keep the smoke test focused.
spring.http.server.enabled=false
