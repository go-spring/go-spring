# RBAC for the "k8s" config provider. The application's ServiceAccount needs
# get/list/watch on the target ConfigMaps (and/or Secrets) in its namespace —
# get for the initial read, list/watch for the informer that drives hot-reload.
# Widen to a ClusterRole only if you read config across namespaces.
#
#   kubectl apply -f rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-k8s
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: config-k8s-reader
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: config-k8s-reader
  namespace: default
subjects:
  - kind: ServiceAccount
    name: config-k8s
    namespace: default
roleRef:
  kind: Role
  name: config-k8s-reader
  apiGroup: rbac.authorization.k8s.io
