spring.kafka.instances.a.brokers=127.0.0.1:9092
spring.kafka.instances.a.topic=hello
spring.kafka.instances.a.group=hello-group

spring.kafka.instances.b.brokers=127.0.0.1:9092
# Producer tuning (works against the plaintext dev broker).
spring.kafka.instances.b.producer.compression=snappy
spring.kafka.instances.b.producer.required-acks=all

# SASL / TLS are disabled here because the dev broker is plaintext.
# Enable them against a secured cluster, e.g.:
# spring.kafka.instances.a.sasl.enabled=true
# spring.kafka.instances.a.sasl.mechanism=scram-sha-512
# spring.kafka.instances.a.sasl.username=app
# spring.kafka.instances.a.sasl.password=secret
# spring.kafka.instances.a.tls.enabled=true
# spring.kafka.instances.a.tls.ca-cert=/etc/kafka/ca.pem
