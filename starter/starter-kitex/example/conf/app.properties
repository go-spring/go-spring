# The built-in HTTP server is disabled so the example exposes only the Kitex
# endpoint below. Without this, gs.Run() would try to bind an HTTP listener on
# the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# Kitex server bind address. starter-kitex's Config reads this via the
# ${spring.kitex.server} prefix + `addr` field, defaulting to :8888. The client
# in example.go dials the same port.
spring.kitex.server.addr=:8888

# Service name advertised by the server. With no registry configured the client
# reaches the server directly by host:port, so this is informational here.
spring.kitex.server.service.name=echo

# Thrift-generated services need server.WithCompatibleMiddlewareForUnary, which
# Kitex's thrift codegen adds in its generated NewServer. starter-kitex leaves
# this off by default, so enable it explicitly.
spring.kitex.server.compatible-unary-middleware=true

# registry.etcd is intentionally left unset: this example runs registry-free so
# it needs no external etcd. Set it (e.g. 127.0.0.1:2379) to publish the service
# into etcd for discovery, as the contrib/kitex examples do.
