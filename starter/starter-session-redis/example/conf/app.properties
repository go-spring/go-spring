# A Redis client managed by starter-go-redis. The session store reuses this
# client by name, so switching the session backend later is just a blank-import
# swap.
spring.go-redis.cache.addr=127.0.0.1:6379

# A session store bound to the redis client above. `client` is required; leaving
# it empty makes the starter fail-fast on boot. Two managers in the example share
# this single store, proving cross-replica session sharing.
spring.session.redis.web.client=cache
spring.session.redis.web.key-prefix=starter-session-redis:example:
