# Disable the built-in HTTP server: this example only runs a gRPC listener.
spring.http.server.enabled=false

# gRPC server listen address. starter-grpc reads ${spring.grpc.server.addr}
# with a default of ":9494" — set it explicitly for clarity.
spring.grpc.server.addr=:9494

# Message-size caps and concurrency limits (0 keeps the gRPC default).
spring.grpc.server.maxRecvMsgSize=4194304
spring.grpc.server.maxSendMsgSize=4194304
spring.grpc.server.maxConcurrentStreams=100

# Server-side keepalive enforcement. Zero values leave gRPC defaults intact.
spring.grpc.server.keepalive.time=2h
spring.grpc.server.keepalive.timeout=20s

# The standard grpc_health_v1 service is on by default; shown here for clarity.
spring.grpc.server.health.enabled=true

# TLS is available but left off so the example client can dial insecurely. To
# enable it set tls.enabled=true plus tls.certFile / tls.keyFile.
