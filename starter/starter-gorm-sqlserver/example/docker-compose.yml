services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: starter-gorm-sqlserver
    ports:
      - "127.0.0.1:1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ng!Passw0rd"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Str0ng!Passw0rd" -No -Q "SELECT 1"
          || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "Str0ng!Passw0rd" -Q "SELECT 1"
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 30s
