services:
  postgres:
    image: postgres:16
    container_name: starter-gorm-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: "test"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 30
