spring.gorm.postgres.primary.host=127.0.0.1
spring.gorm.postgres.primary.port=5432
spring.gorm.postgres.primary.user=postgres
spring.gorm.postgres.primary.password=123456
spring.gorm.postgres.primary.db=test
spring.gorm.postgres.primary.sslmode=disable
# Connection pool tuning, startup fail-fast ping timeout, and slow-query logging.
spring.gorm.postgres.primary.max-open-conns=10
spring.gorm.postgres.primary.max-idle-conns=5
spring.gorm.postgres.primary.conn-max-lifetime=30m
spring.gorm.postgres.primary.conn-max-idle-time=5m
spring.gorm.postgres.primary.ping-timeout=5s
spring.gorm.postgres.primary.slow-threshold=200ms
# TLS is negotiated through sslmode (disabled here; smoke DB is plaintext). To
# enable a verifying connection, set sslmode=verify-full and supply certs:
# spring.gorm.postgres.primary.sslmode=verify-full
# spring.gorm.postgres.primary.sslrootcert=/path/ca.pem
# spring.gorm.postgres.primary.sslcert=/path/client-cert.pem
# spring.gorm.postgres.primary.sslkey=/path/client-key.pem

spring.gorm.postgres.replica.host=127.0.0.1
spring.gorm.postgres.replica.port=5432
spring.gorm.postgres.replica.user=postgres
spring.gorm.postgres.replica.password=123456
spring.gorm.postgres.replica.db=test
spring.gorm.postgres.replica.sslmode=disable

# This instance resolves its address via service discovery. `host`/`port` are
# dummies on purpose — they are ignored because `service-name` is set, proving
# the address comes from the registered discovery backend (see discovery.go).
# `port` still has to parse as a valid TCP port for the pgx DSN parser, so it is
# a plausible value rather than 0.
spring.gorm.postgres.discovery.host=0.0.0.0
spring.gorm.postgres.discovery.port=5432
spring.gorm.postgres.discovery.user=postgres
spring.gorm.postgres.discovery.password=123456
spring.gorm.postgres.discovery.db=test
spring.gorm.postgres.discovery.sslmode=disable
spring.gorm.postgres.discovery.service-name=postgres-cluster
