# A Redis client managed by starter-go-redis. The lock starter reuses this
# client by name, so switching lock backend later is just a blank-import swap.
spring.go-redis.cache.addr=127.0.0.1:6379

# A Locker bound to the redis client above. `client` is required; leaving it
# empty makes the starter fail-fast on boot.
spring.lock.jobs.client=cache
spring.lock.jobs.ttl=10s
spring.lock.jobs.retry-interval=100ms
spring.lock.jobs.key-prefix=starter-lock-redis:example:
