# Unified observability, consolidated onto one management port.
spring.observability.enable=true
spring.observability.service-name=otel-actuator-example

# Tracing: enabling it installs the trace_id/span_id -> log correlation hook.
# The stdout exporter keeps the example self-contained (no collector needed).
spring.observability.trace.exporter=stdout
spring.observability.trace.sampler-ratio=1.0

# Metrics via the pull-based Prometheus exporter. port=0 disables the dedicated
# scrape server, so /metrics is served ONLY through the actuator management port
# below — the Task-4 consolidation: one port for probes and metrics.
spring.observability.metrics.exporter=prometheus
spring.observability.metrics.port=0
spring.observability.metrics.path=/metrics

# Actuator management server: /health, /readiness, /startup, /info, and the
# mounted /metrics all live here on :9370.
spring.actuator.enabled=true
spring.actuator.addr=:9370

# This example only needs the actuator server; disable the default main HTTP
# server to keep the smoke test focused.
spring.http.server.enabled=false
