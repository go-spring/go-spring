# The config bus reuses a NATS connection as the refresh transport. The
# instance name must match spring.config.bus.nats-instance (default
# "config-bus").
spring.nats.config-bus.url=nats://127.0.0.1:4222

# Bus settings. The subject is where refresh signals are published and
# subscribed; every instance sharing it forms one bus. Left at defaults here.
# spring.config.bus.subject=spring.config.refresh
# spring.config.bus.watch-prefixes=db,cache

# The value the demo binds to. It starts as "v0"; the demo overrides it via an
# environment source (GS_DEMO_MESSAGE) and then broadcasts a bus refresh so the
# bound field picks up the new value without a restart.
demo.message=v0
