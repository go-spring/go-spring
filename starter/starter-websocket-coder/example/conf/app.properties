# The websocket starter no longer owns a listener; it only contributes a
# *websocket.AcceptOptions. WebSocket routes are mounted on the built-in gs
# http server, which we point at :9797 to match the example client.
spring.http.server.enabled=true
spring.http.server.addr=:9797

# WebSocket connections are long-lived, so disable the server's read/write
# timeouts to avoid cutting connections mid-stream.
spring.http.server.readTimeout=0
spring.http.server.writeTimeout=0
spring.http.server.idleTimeout=0

# AcceptOptions tuning. Advertise a supported subprotocol so the server can
# negotiate it with clients that request it; enable context-takeover
# compression for larger frames.
spring.websocket.subprotocols=echo.v1
spring.websocket.compressionMode=1
