spring.redigo.cache.addr=127.0.0.1:6379
spring.redigo.cache.driver=AnotherRedisDriver

spring.redigo.session.addr=127.0.0.1:6379
spring.redigo.session.driver=AnotherRedisDriver

# TLS is off by default. To dial Redis over TLS, enable it and point at the
# CA/cert files (client cert/key only needed for mutual TLS). Field names match
# starter-go-redis:
#   spring.redigo.cache.tls.enabled=true
#   spring.redigo.cache.tls.ca-file=/path/to/ca.pem
#   spring.redigo.cache.tls.cert-file=/path/to/client.pem
#   spring.redigo.cache.tls.key-file=/path/to/client.key
#   spring.redigo.cache.tls.server-name=redis.example.com
