# Target workload the example discovers: a Deployment fronted by a *headless*
# Service (clusterIP: None). A headless Service publishes per-Pod DNS records,
# which is exactly what DNS-mode discovery resolves. The port is named "grpc" so
# an SRV query (_grpc._tcp.demo.default.svc.cluster.local) returns it.
#
#   kubectl apply -f demo-service.yaml
#
# nginx is used only as a stand-in TCP listener; discovery cares about the Pod
# addresses and the named port, not the protocol spoken on it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  namespace: default
  labels:
    app: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
        - name: demo
          image: nginx:alpine
          ports:
            - name: grpc
              containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: demo
  namespace: default
  labels:
    app: demo
spec:
  clusterIP: None # headless: publishes per-Pod A/SRV records
  selector:
    app: demo
  ports:
    - name: grpc
      port: 80
      targetPort: grpc
