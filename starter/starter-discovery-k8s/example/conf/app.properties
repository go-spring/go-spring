spring.app.name=discovery-k8s-example

# One Kubernetes discovery backend named "k8s". A client selects it by setting
# its `discovery: k8s` field; here the example resolves the "demo" Service
# through it directly (see main.go).

# --- DNS mode (default): headless Service DNS, zero extra dependency, no RBAC.
spring.discovery.k8s.k8s.mode=dns
spring.discovery.k8s.k8s.namespace=default
# port-name drives an SRV query (_grpc._tcp.<svc>...), returning address+port.
# Omit it and set `port` instead to use A records with a fixed port.
spring.discovery.k8s.k8s.port-name=grpc
spring.discovery.k8s.k8s.cluster-domain=cluster.local
# How often the DNS watcher re-resolves to detect scale changes.
spring.discovery.k8s.k8s.refresh-interval=5s

# --- EndpointSlice mode (real-time, needs client-go + RBAC). To switch, set:
#   spring.discovery.k8s.k8s.mode=endpointslice
# In-cluster auth is used when kubeconfig is empty; set it to run out-of-cluster:
#   spring.discovery.k8s.k8s.kubeconfig=/home/me/.kube/config
#   spring.discovery.k8s.k8s.resync-period=0
