# No HTTP server needed; the process exposes only the goframe gRPC server.
spring.http.server.enabled=false

# goframe gRPC server, bound from the ${spring.goframe.grpc.server} prefix.
spring.goframe.grpc.server.name=goframe-grpc
spring.goframe.grpc.server.address=:8001

# Registration into etcd is off by default (registry.etcd empty); the example
# client dials the provider directly. Tracing is deferred to starter-otel.
