# No HTTP server needed; the process exposes only the goframe TCP server.
spring.http.server.enabled=false

# goframe raw-TCP server, bound from the ${spring.goframe.tcp.server} prefix.
spring.goframe.tcp.server.name=goframe-tcp
spring.goframe.tcp.server.address=:8003

# Registration into etcd is off by default (registry.etcd empty); the example
# client dials the provider directly. Set registry.etcd plus advertise.host/port
# to publish the endpoint for discovery.
