# No standalone HTTP server needed; the goframe *ghttp.Server (which also serves
# the WebSocket upgrade route) is registered by the starter.
spring.http.server.enabled=false

# goframe WebSocket server, bound from the ${spring.goframe.ws.server} prefix.
spring.goframe.ws.server.name=goframe-ws
spring.goframe.ws.server.address=:8002

# Registration into etcd is off by default (registry.etcd empty); the example
# client dials the provider directly.
