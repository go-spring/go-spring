# The Go-Spring built-in HTTP server is disabled so the process exposes only the
# goframe *ghttp.Server registered by the starter.
spring.http.server.enabled=false

# goframe HTTP server, bound from the ${spring.goframe.http.server} prefix.
spring.goframe.http.server.name=goframe-http
spring.goframe.http.server.address=:8000

# Registration into etcd is off by default (registry.etcd empty). Set it to an
# etcd address to publish the server for discovery. Tracing is deferred to
# starter-otel; native metrics stay off by default.
