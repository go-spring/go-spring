spring.elasticsearch.docs.addresses=http://127.0.0.1:9200
spring.elasticsearch.docs.driver=AnotherESDriver

spring.elasticsearch.logs.addresses=http://127.0.0.1:9200
spring.elasticsearch.logs.driver=AnotherESDriver
spring.elasticsearch.logs.max-retries=3

# This instance resolves its node addresses via service discovery. The static
# `addresses` below is a non-resolvable dummy on purpose — it is overridden
# because `service-name` is set, so a successful cluster probe proves the
# addresses come from the registered discovery backend (see discovery.go), not
# config. `discovery-scheme` prepends the URL scheme to the discovered host:port.
spring.elasticsearch.disc.addresses=http://nonexistent.invalid:9200
spring.elasticsearch.disc.service-name=es-cluster
spring.elasticsearch.disc.discovery-scheme=http

# Authentication and TLS are already supported end-to-end; the smoke-test
# cluster runs without security, so the fields below are documented but unset.
# spring.elasticsearch.logs.username=elastic
# spring.elasticsearch.logs.password=changeme
# spring.elasticsearch.logs.api-key=<base64-api-key>
# spring.elasticsearch.logs.service-token=<service-account-token>
# spring.elasticsearch.logs.certificate-fingerprint=<sha256-hex-fingerprint>
