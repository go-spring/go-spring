# Enable the pprof starter. When true, starter-pprof registers a dedicated
# HTTP server (separate from the main gs http server) that exposes the
# standard net/http/pprof endpoints under /debug/pprof/.
spring.pprof.enabled=true

# Address used by the dedicated pprof HTTP server. Default is :9981.
# The example's runTest() targets this address.
spring.pprof.addr=:9981
