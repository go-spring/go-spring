# Enable the pprof starter. When true, starter-pprof registers a dedicated
# HTTP server (separate from the main gs http server) that exposes the
# standard net/http/pprof endpoints under /debug/pprof/.
spring.pprof.enabled=true

# Address used by the dedicated pprof HTTP server. Defaults to a loopback-only
# bind (127.0.0.1:9981) so the endpoints are not reachable off-host by default.
spring.pprof.addr=127.0.0.1:9981

# Token protection. When set, every request must present the token as either
# "Authorization: Bearer <token>" or "?token=<token>". Basic auth is also
# supported via spring.pprof.username / spring.pprof.password.
spring.pprof.token=s3cr3t
