spring.app.name=registry-consul-example

# Consul agent to register into. Setting the address activates the starter.
spring.registry.consul.address=127.0.0.1:8500
# TTL health check; the starter heartbeats at half this interval.
spring.registry.consul.ttl=10s
spring.registry.consul.deregister-critical-after=30s

# The instance to advertise (backend-agnostic; switching registry backends is a
# blank-import swap, not a config change).
spring.registry.service-name=orders
spring.registry.addr=127.0.0.1:8080
spring.registry.weight=100
spring.registry.metadata.zone=cn-north
spring.registry.metadata.version=v1
