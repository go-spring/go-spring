# Enable the actuator starter. When true, starter-actuator registers a
# dedicated HTTP server (separate from the main gs http server) that exposes
# operational endpoints: /health (liveness), /readiness, and /info.
spring.actuator.enabled=true

# Address for the dedicated actuator management server. Binds all interfaces by
# default so in-cluster K8s probes can reach it. Distinct from the main HTTP
# server (:9090) and the pprof server (127.0.0.1:9981).
spring.actuator.addr=:9370

# This example only needs the actuator server, so the default main HTTP server
# is disabled to keep the smoke test focused (and off :9090).
spring.http.server.enabled=false

# Graceful drain window. On SIGTERM the framework flips readiness to
# OUT_OF_SERVICE (actuator /readiness -> 503) and waits this long before
# stopping servers, so a Kubernetes endpoint controller can remove this pod
# before it stops serving. The smoke test observes the 503 during this window.
app.shutdown.pre-stop-delay=2s

# --- Logging config ---
# A root console logger so the /loggers endpoint has a logger to list and
# control at runtime (GET /loggers, POST /loggers/root).
logging.appender.console.type=ConsoleAppender
logging.appender.console.layout.type=TextLayout
logging.logger.root.type=Logger
logging.logger.root.level=INFO
logging.logger.root.appenderRef.ref=console

# --- Sample properties for /env and /configprops ---
# Ordinary values pass through; secret-named keys and ENC(...) placeholders are
# masked by the actuator, so the smoke test can assert redaction.
demo.datasource.url=jdbc:mysql://localhost:3306/demo
demo.datasource.password=super-secret-pw
demo.api.token=abcdef123456
demo.encrypted.value=ENC(9f8a7b6c5d)

