# The swagger starter contributes an endpoint.Endpoint (interactive API docs)
# and does not own a listener. This example mounts it on the built-in gs http
# server, which we point at :9696 to match the smoke-test client.
spring.http.server.enabled=true
spring.http.server.addr=:9696

# Serve the OpenAPI document generated by `gs-http-gen --openapi`. Here we point
# at the sample spec shipped alongside this example. The UI is reachable at
# http://127.0.0.1:9696/swagger/ and the raw spec at /swagger/openapi.json.
spring.swagger.specFile=openapi.json
spring.swagger.basePath=/swagger
spring.swagger.title=Greeter API Docs
