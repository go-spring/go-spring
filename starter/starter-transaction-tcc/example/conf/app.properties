# starter-transaction-tcc keeps the in-process coordinator on with its defaults.
# Both toggles below are the built-in defaults, shown here for discoverability.
spring.transaction.tcc.enabled=true
spring.transaction.tcc.tracing=true

# With the in-memory default Store a restart loses the log, so recovery is a
# no-op; import a durable-Store starter to make it meaningful.
spring.transaction.tcc.recover-on-start=true
