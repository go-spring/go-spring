# Declarative HTTP client instances. Each entry under spring.http-client.<name>
# becomes a named *http.Client the container injects by that name; the generated
# proto.Client only holds an *http.Client, so switching addressing is config-only.

# (1) Direct address: pinned to one backend instance, no discovery.
spring.http-client.direct.addr=127.0.0.1:9471

# (2) Service discovery + load balancing: routes by logical name through the
# "static" discovery backend registered in code, round-robin across instances.
spring.http-client.discovered.service-name=greet-svc
spring.http-client.discovered.discovery=static
spring.http-client.discovered.balancer=round_robin

# (3) Resilience: a direct client to a backend that always fails. The bundled
# zero-dependency "default" driver trips the breaker after two consecutive
# failures; switching to sentinel is driver=sentinel plus a blank import of
# starter-resilience, with no code change.
spring.http-client.guarded.addr=127.0.0.1:9473
spring.http-client.guarded.resilience.enabled=true
spring.http-client.guarded.resilience.driver=default
spring.http-client.guarded.resilience.error-threshold=2
spring.http-client.guarded.resilience.open-duration=30s

# This example drives everything from runTest; no inbound HTTP server needed.
spring.http.server.enabled=false
