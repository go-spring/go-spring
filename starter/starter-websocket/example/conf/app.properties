# The websocket starter no longer owns a listener; it only contributes a
# *websocket.Upgrader. WebSocket routes are mounted on the built-in gs http
# server, which we point at :9696 to match the example client.
spring.http.server.enabled=true
spring.http.server.addr=:9696

# WebSocket connections are long-lived, so disable the server's read/write
# timeouts to avoid cutting connections mid-stream.
spring.http.server.readTimeout=0
spring.http.server.writeTimeout=0
spring.http.server.idleTimeout=0

# Upgrader tuning. Enable permessage-deflate compression and restrict which
# Origins may open a socket. Leave allowedOrigins empty to keep gorilla's
# default same-origin policy; a single "*" would accept any origin.
spring.websocket.enableCompression=true
spring.websocket.allowedOrigins=http://127.0.0.1:9696
