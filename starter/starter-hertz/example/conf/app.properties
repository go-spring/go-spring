# Hertz drives its own HTTP server, so the built-in Go-Spring HTTP server must
# be disabled to avoid a port clash and duplicate lifecycle management. Unlike
# gin/echo (which wrap a standard http.Server), Hertz owns its listener, but the
# address is still taken from config here — the starter passes it via
# WithHostPorts, so no port is hard-coded in example.go.
spring.http.server.enabled=false
spring.hertz.server.addr=127.0.0.1:8003
