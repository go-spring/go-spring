# Disable the built-in HTTP server so the example only exposes the
# Thrift endpoint below. Without this, gs.Run() would try to bind an
# HTTP listener on the default port and complain that no handlers are
# registered.
spring.http.server.enabled=false

# Thrift server bind address. The Config struct in starter.go reads this
# via the `${spring.thrift.server}` prefix + `addr` field with a default
# of :9292. The client in example.go dials the same port.
spring.thrift.server.addr=:9292

# Per-connection client timeout applied to the server socket (0 = no timeout).
spring.thrift.server.clientTimeout=30s

# Wire protocol: binary (default) / compact / json. The client in
# example.go must use the matching protocol factory. This example uses
# compact to exercise a non-default protocol end-to-end.
spring.thrift.server.protocol=compact

# Transport wrapper: none (raw socket, default) / buffered / framed. The
# client must use the matching transport. This example uses framed, which
# many cross-language clients require; the client wraps its socket in
# TFramedTransport to match.
spring.thrift.server.transport=framed

# Buffer / max frame size (bytes) for buffered/framed transports.
spring.thrift.server.bufferSize=4096

# TLS is available but left off here so the plaintext example client can
# connect. To enable it set tls.enabled=true plus tls.certFile / tls.keyFile.
