# Disable the built-in HTTP server so the example only exposes the
# Thrift endpoint below. Without this, gs.Run() would try to bind an
# HTTP listener on the default port and complain that no handlers are
# registered.
spring.http.server.enabled=false

# Thrift server bind address. The Config struct in starter.go reads this
# via the `${spring.thrift.server}` prefix + `addr` field with a default
# of :9292. The client in example.go dials the same port.
spring.thrift.server.addr=:9292
