# The scheduler is enabled by default; this line is here to document the knob.
spring.scheduler.enabled=true

# Bound how long graceful shutdown waits for in-flight runs to drain.
spring.scheduler.drain-timeout=5s

# A fixed-rate job: fires every 200ms measured from each scheduled fire time.
spring.scheduler.jobs.tick.fixed-rate=200ms

# A fixed-delay job: fires 200ms after the previous run finishes (never overlaps).
spring.scheduler.jobs.delay.fixed-delay=200ms

# A cron job: standard 5-field expression, here every minute. Wired but too slow
# to fire within the short smoke window.
spring.scheduler.jobs.beat.cron=* * * * *

# A fixed-rate job de-duplicated across replicas via the "memory" lock.Locker
# bean. Each fire acquires the lock; only the holder runs. lock-key defaults to
# the job name.
spring.scheduler.jobs.locked.fixed-rate=200ms
spring.scheduler.jobs.locked.lock=memory
spring.scheduler.jobs.locked.lock-ttl=5s
