spring.pulsar.instances.a.url=pulsar://127.0.0.1:6650
spring.pulsar.instances.a.fail-fast=true
# The default standalone bootstrap creates the public/default namespace, so a
# non-partitioned topic lookup succeeds even when the topic does not yet exist.
# Point at the topic the example actually uses to guarantee the probe reaches
# the broker without side effects.
spring.pulsar.instances.a.health-check-topic=persistent://public/default/hello

spring.pulsar.instances.b.url=pulsar://127.0.0.1:6650
spring.pulsar.instances.b.fail-fast=true
spring.pulsar.instances.b.health-check-topic=persistent://public/default/hello

