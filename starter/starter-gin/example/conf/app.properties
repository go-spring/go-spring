# Disable Go-Spring's built-in HTTP server so the gin.Engine bean
# owns the port through the starter-gin SimpleGinServer wrapper.
spring.http.server.enabled=false

# starter-gin listens on :8001 so it can run alongside starter-echo
# (:8002) and starter-hertz (:8003) without a port clash.
spring.gin.server.addr=:8001

# Cap request bodies at 1 MiB. Oversized bodies are rejected by the
# starter-owned http.MaxBytesHandler before reaching handlers.
spring.gin.server.maxBodySize=1048576

# Expose an opt-in liveness endpoint served by the starter itself.
spring.gin.server.health.enabled=true
spring.gin.server.health.path=/healthz

# TLS is available but left off here so the example client can use plain
# HTTP. To enable HTTPS set tls.enabled=true plus tls.cert-file / tls.key-file.
