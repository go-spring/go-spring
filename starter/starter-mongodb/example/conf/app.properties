spring.mongodb.a.uri=mongodb://127.0.0.1:27017
spring.mongodb.a.max-pool-size=100
spring.mongodb.a.min-pool-size=1
spring.mongodb.a.max-conn-idle-time=5m
spring.mongodb.a.server-selection-timeout=10s

spring.mongodb.b.uri=mongodb://127.0.0.1:27017
# TLS and authentication are disabled here because the smoke-test server is a
# plain local instance; the fields below document how to enable them.
# spring.mongodb.b.username=root
# spring.mongodb.b.password=secret
# spring.mongodb.b.auth-source=admin
# spring.mongodb.b.auth-mechanism=SCRAM-SHA-256
# spring.mongodb.b.tls.enabled=true
# spring.mongodb.b.tls.ca-file=/etc/mongo/ca.pem
# spring.mongodb.b.tls.cert-file=/etc/mongo/client.pem
# spring.mongodb.b.tls.key-file=/etc/mongo/client-key.pem

# This instance resolves its address via service discovery. The uri host is a
# non-resolvable dummy on purpose — it is ignored because `service-name` is set,
# so a successful connection proves the address comes from the registered
# discovery backend (see discovery.go), not config. directConnection keeps the
# driver on the dialed seed instead of doing its own replica-set topology
# discovery.
spring.mongodb.disc.uri=mongodb://nonexistent.invalid:27017/?directConnection=true
spring.mongodb.disc.service-name=mongo-cluster
spring.mongodb.disc.server-selection-timeout=10s
