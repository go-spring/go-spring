spring.memcached.cache.servers=127.0.0.1:11211
spring.memcached.cache.driver=AnotherMemcachedDriver

spring.memcached.session.servers=127.0.0.1:11211
spring.memcached.session.driver=AnotherMemcachedDriver

# This instance resolves its server list via service discovery. `servers` is
# omitted on purpose — the list comes from the registered discovery backend
# (see discovery.go). It uses the DefaultDriver, which consumes discovery.
spring.memcached.discovery.service-name=memcached-cluster

