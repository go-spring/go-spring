# The built-in HTTP server is disabled so the example exposes only the tRPC
# endpoint below. Without this, gs.Run() would try to bind an HTTP listener on
# the default port and complain that no handlers are registered.
spring.http.server.enabled=false

# tRPC server bind address. starter-trpc's Config reads this via the
# ${spring.trpc.server} prefix + `addr` field and splits it into tRPC's IP/Port.
# Unlike stock tRPC-Go, there is NO trpc_go.yaml: starter-trpc builds a
# *trpc.Config programmatically from these properties and calls
# trpc.NewServerWithConfig. The client in example.go dials the same address.
spring.trpc.server.addr=127.0.0.1:8000

# Fully-qualified tRPC service name (trpc.app.server.service). The client's
# generated stub targets this callee name; the two sides must agree.
spring.trpc.server.service.name=trpc.helloworld.greet.GreetService

# ── Logging ───────────────────────────────────────────────────────────────────
# starter-trpc bridges tRPC's internal log into go-spring's log module (installed
# in its init(), see starter-trpc/logbridge.go). This example ships no
# observability backend (it is direct-connect, no docker), so no FileLogger sink
# is configured: bridged tRPC log lines flow to go-spring's default ConsoleLogger,
# proving the bridge visibly on stdout. An observability variant would add a
# FileLogger root here to route them to a file → Promtail → Loki pipeline instead.
