spring.go-redis.cache.addr=127.0.0.1:6379
spring.go-redis.cache.driver=AnotherRedisDriver

spring.go-redis.session.addr=127.0.0.1:6379
spring.go-redis.session.driver=AnotherRedisDriver

# This instance resolves its address via service discovery. `addr` is a dummy
# on purpose — it is ignored because `service-name` is set, proving the address
# comes from the registered discovery backend (see discovery.go), not config.
spring.go-redis.discovery.addr=0.0.0.0:0
spring.go-redis.discovery.service-name=redis-cluster

# Sentinel topology: connect to the master group "mymaster" resolved through the
# listed sentinel nodes. The bean type stays *redis.Client. Service discovery is
# not used here (sentinels do the node discovery); setting service-name in this
# mode is rejected at startup.
spring.go-redis.sentinel.mode=sentinel
spring.go-redis.sentinel.master-name=mymaster
spring.go-redis.sentinel.sentinel-addrs=127.0.0.1:26379

# Cluster topology: seed the client with the cluster entry nodes. The bean type
# is *redis.ClusterClient (distinct from *redis.Client). `addrs` are seeds only;
# the client learns the full topology from the cluster. RouteByLatency/
# RouteRandomly and max-redirects are optional cluster tunables.
spring.go-redis.cluster.mode=cluster
spring.go-redis.cluster.addrs=127.0.0.1:7000,127.0.0.1:7001,127.0.0.1:7002,127.0.0.1:7003,127.0.0.1:7004,127.0.0.1:7005
spring.go-redis.cluster.route-by-latency=true

# TLS is off by default. To dial Redis over TLS, enable it and point at the
# CA/cert files (client cert/key only needed for mutual TLS):
#   spring.go-redis.cache.tls.enabled=true
#   spring.go-redis.cache.tls.ca-file=/path/to/ca.pem
#   spring.go-redis.cache.tls.cert-file=/path/to/client.pem
#   spring.go-redis.cache.tls.key-file=/path/to/client.key
#   spring.go-redis.cache.tls.server-name=redis.example.com
