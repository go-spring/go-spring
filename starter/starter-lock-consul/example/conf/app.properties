spring.lock.jobs.address=127.0.0.1:8500
spring.lock.jobs.ttl=15s
spring.lock.jobs.key-prefix=demo/jobs/

spring.lock.singleton.address=127.0.0.1:8500
spring.lock.singleton.ttl=15s
spring.lock.singleton.key-prefix=demo/singleton/

# TLS to the Consul agent (optional). The local smoke agent runs on plain HTTP,
# so these stay disabled here; a hardened deployment would set them, e.g.:
#   spring.lock.jobs.tls.enabled=true
#   spring.lock.jobs.tls.ca-file=/etc/consul/ca.pem
#   spring.lock.jobs.tls.cert-file=/etc/consul/client-cert.pem
#   spring.lock.jobs.tls.key-file=/etc/consul/client-key.pem
