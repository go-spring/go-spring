# Import configuration from a mounted directory using the "file-watch"
# provider. The path points at the mount root (a directory); the provider reads
# every recognized file in it and installs a directory watcher so changes —
# including the atomic ..data symlink swap Kubernetes performs on a ConfigMap /
# Secret update — trigger a live property refresh.
#
# In a real deployment this would be the volume mount path, e.g.
#   spring.app.imports=file-watch:/etc/config
# and the ConfigMap keys (application.yml, application.properties, ...) carry
# recognized extensions so they are parsed by type; add ?format=properties to
# force a format for keys without an extension.
spring.app.imports=file-watch:./mount

# This example only exercises the config provider, so the default main HTTP
# server is disabled to keep the smoke test focused.
spring.http.server.enabled=false
