spring.oauth2.client.downstream.client-id=demo-client
spring.oauth2.client.downstream.client-secret=demo-secret
spring.oauth2.client.downstream.token-url=http://127.0.0.1:9401/oauth/token
spring.oauth2.client.downstream.scopes=read,write
spring.oauth2.client.downstream.auth-style=header
spring.oauth2.client.downstream.timeout=5s
spring.oauth2.client.downstream.endpoint-params.audience=https://api.example.com

# Resilience wraps this client's transport. Using the bundled zero-dependency
# "default" driver here; switching to sentinel is: driver=sentinel plus a blank
# import of starter-resilience, with no code change. A flaky endpoint that fails
# twice then succeeds is recovered within max-retries; error-threshold is kept
# high so those transient failures never trip the breaker.
spring.oauth2.client.downstream.resilience.enabled=true
spring.oauth2.client.downstream.resilience.driver=default
spring.oauth2.client.downstream.resilience.max-retries=3
spring.oauth2.client.downstream.resilience.error-threshold=10
spring.oauth2.client.downstream.resilience.attempt-timeout=2s

spring.oauth2.authcode.login.client-id=web-client
spring.oauth2.authcode.login.client-secret=web-secret
spring.oauth2.authcode.login.auth-url=http://127.0.0.1:9401/oauth/authorize
spring.oauth2.authcode.login.token-url=http://127.0.0.1:9401/oauth/token
spring.oauth2.authcode.login.redirect-url=http://127.0.0.1:9402/callback
spring.oauth2.authcode.login.scopes=openid,profile
