spring.neo4j.graph.uri=bolt://127.0.0.1:7687
spring.neo4j.graph.username=neo4j
spring.neo4j.graph.password=password
spring.neo4j.graph.driver=AnotherNeo4jDriver

spring.neo4j.analytics.uri=bolt://127.0.0.1:7687
spring.neo4j.analytics.username=neo4j
spring.neo4j.analytics.password=password
spring.neo4j.analytics.driver=AnotherNeo4jDriver
spring.neo4j.analytics.max-connection-pool-size=50
spring.neo4j.analytics.connection-acquisition-timeout=1m

# TLS trust is only used for the encrypted URI schemes (bolt+s / neo4j+s).
# Switch the uri scheme to enable encryption, then point at your CA / client
# certificate below.
# spring.neo4j.analytics.uri=neo4j+s://127.0.0.1:7687
# spring.neo4j.analytics.tls.ca-cert-file=/etc/neo4j/ca.pem
# spring.neo4j.analytics.tls.cert-file=/etc/neo4j/client.pem
# spring.neo4j.analytics.tls.key-file=/etc/neo4j/client-key.pem
