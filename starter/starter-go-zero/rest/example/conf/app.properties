# The Go-Spring built-in HTTP server is disabled so the process exposes only the
# go-zero rest.Server registered by the starter. Without this, gs.Run() would try
# to bind its own HTTP listener and complain that no handlers are registered.
spring.http.server.enabled=false

# go-zero rest.Server, bound from the ${spring.go-zero.rest.server} prefix.
spring.go-zero.rest.server.name=greet
spring.go-zero.rest.server.host=0.0.0.0
spring.go-zero.rest.server.port=8888

# Tracing is deferred to starter-otel by default (tracing.disabled=true), so no
# tracing config is needed here; import starter-otel to light up spans. Metrics
# (go-zero's native Prometheus DevServer) stay off by default.
