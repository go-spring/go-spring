# The Go-Spring built-in HTTP server is disabled so the process exposes only the
# go-zero zrpc server registered by the starter.
spring.http.server.enabled=false

# go-zero zrpc.RpcServer, bound from the ${spring.go-zero.zrpc.server} prefix.
spring.go-zero.zrpc.server.name=greet-rpc
spring.go-zero.zrpc.server.listen-on=0.0.0.0:8081

# etcd is optional: leaving etcd.addr empty makes this a plain direct-connect
# gRPC server (the example dials 127.0.0.1:8081 directly). Set etcd.addr +
# etcd.key to publish this server into etcd for service discovery instead.
#
# Tracing is deferred to starter-otel by default (tracing.disabled=true); import
# starter-otel to light up spans. Metrics (go-zero's native Prometheus DevServer)
# stay off by default.
