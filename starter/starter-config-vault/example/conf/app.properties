# Import a configuration document from a Vault KV v2 secret. "optional:" lets
# the app start even when the secret does not exist yet; the value is filled in
# once written and refreshed live via the provider's polling watcher. The
# single-field mode (key=application.properties) reads one secret field that
# holds a full properties document. The Vault token comes from VAULT_TOKEN, not
# from this file.
spring.app.imports=optional:vault:127.0.0.1:8200/secret/gs-config-demo?kv-version=2&key=application.properties&format=properties&poll-ms=1000
