# Disable Go-Spring's built-in HTTP server so the echo.Echo bean
# owns the port through the starter-echo SimpleEchoServer wrapper.
spring.http.server.enabled=false

# starter-echo listens on :8002 so it can run alongside starter-gin
# (:8001) and starter-hertz (:8003) without a port clash.
spring.echo.server.addr=:8002

# Cap request bodies at 1 MiB. Oversized bodies are rejected by the
# starter-owned http.MaxBytesHandler before reaching handlers.
spring.echo.server.maxBodySize=1048576

# Expose an opt-in liveness endpoint served by the starter itself.
spring.echo.server.health.enabled=true
spring.echo.server.health.path=/healthz

# TLS is available but left off here so the example client can use plain
# HTTP. To enable HTTPS set tls.enabled=true plus tls.certFile / tls.keyFile.
