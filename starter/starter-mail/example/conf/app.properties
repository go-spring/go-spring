# The `notify` mailer points at the local MailHog SMTP server, which speaks
# plaintext SMTP with no auth on port 1025 — so TLS and authentication stay off
# here. A real deployment would use a submission host, e.g.:
#   spring.mail.notify.host=smtp.example.com
#   spring.mail.notify.port=587
#   spring.mail.notify.username=apikey
#   spring.mail.notify.password=${SMTP_PASSWORD}
#   spring.mail.notify.tls.mode=starttls
spring.mail.notify.host=127.0.0.1
spring.mail.notify.port=1025
spring.mail.notify.from=noreply@example.com
spring.mail.notify.tls.mode=none
