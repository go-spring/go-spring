spring.app.name=lock-k8s-example

# This example only exercises the Lease-backed lock, so the default main HTTP
# server is disabled to keep the smoke test focused. The spring.lock.<name>
# entry is set programmatically in main.go only when a cluster is reachable, so
# outside a cluster no Locker bean is built and the app boots cleanly.
spring.http.server.enabled=false
