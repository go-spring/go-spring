# Enable the admin-ui starter. When true, starter-admin-ui registers a
# dedicated HTTP server (separate from the main gs http server and the
# actuator) that renders an aggregated status dashboard for a list of
# actuator instances.
spring.admin-ui.enabled=true

# Listen address for the Admin UI. Distinct from the main HTTP server (:9090),
# the actuator (:9370), and pprof (127.0.0.1:9981), so all four can coexist.
spring.admin-ui.addr=:9280

# The actuator base URLs the UI polls. The smoke test brings up two fake
# actuators on these ports; in production these would be the real per-pod
# management ports (typically :9370).
spring.admin-ui.instances[0]=http://127.0.0.1:19371
spring.admin-ui.instances[1]=http://127.0.0.1:19372

# Poll cadence and per-request timeout. The dashboard also auto-refreshes at
# this cadence via a meta refresh tag.
spring.admin-ui.interval=1s
spring.admin-ui.timeout=500ms

# Page title. Configurable so the same binary can be deployed against multiple
# environments and label the dashboard accordingly.
spring.admin-ui.title=Go-Spring Admin

# This example only needs the Admin UI server, so the default main HTTP server
# is disabled to keep the smoke test focused (and off :9090).
spring.http.server.enabled=false
