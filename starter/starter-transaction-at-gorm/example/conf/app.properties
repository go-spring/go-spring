# starter-transaction-at-gorm keeps the in-process coordinator on with its
# defaults. Both toggles below are the built-in defaults, shown here for
# discoverability.
spring.transaction.at.enabled=true

# Tracing wires the otel observer so each branch's second-phase (commit /
# rollback) emits a child span on the globals starter-otel installs. It costs
# almost nothing without starter-otel, since the global tracer is then a no-op.
spring.transaction.at.tracing=true
