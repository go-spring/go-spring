spring.nats.main.url=nats://127.0.0.1:4222
spring.nats.main.jetstream.enabled=true

spring.nats.work.url=nats://127.0.0.1:4222

# TLS and authentication (optional). The local smoke broker uses neither, so
# these stay disabled here; a hardened deployment would set them, e.g.:
#   spring.nats.main.tls.enabled=true
#   spring.nats.main.tls.ca-file=/etc/nats/ca.pem
#   spring.nats.main.tls.cert-file=/etc/nats/client-cert.pem
#   spring.nats.main.tls.key-file=/etc/nats/client-key.pem
#   spring.nats.main.creds-file=/etc/nats/app.creds
#   spring.nats.main.nkey-file=/etc/nats/app.nk
