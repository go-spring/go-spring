spring.gorm.clickhouse.primary.user=default
spring.gorm.clickhouse.primary.password=
spring.gorm.clickhouse.primary.addr=127.0.0.1:9000
spring.gorm.clickhouse.primary.db=default
# Connection pool tuning, startup fail-fast ping timeout, and slow-query logging.
spring.gorm.clickhouse.primary.max-open-conns=10
spring.gorm.clickhouse.primary.max-idle-conns=5
spring.gorm.clickhouse.primary.conn-max-lifetime=30m
spring.gorm.clickhouse.primary.conn-max-idle-time=5m
spring.gorm.clickhouse.primary.ping-timeout=5s
spring.gorm.clickhouse.primary.slow-threshold=200ms
# TLS (disabled here; the smoke server is plaintext). To enable a secure native
# connection:
# spring.gorm.clickhouse.primary.tls-enabled=true
# spring.gorm.clickhouse.primary.tls-skip-verify=false
# spring.gorm.clickhouse.primary.tls-ca=/path/ca.pem
# spring.gorm.clickhouse.primary.tls-cert=/path/client-cert.pem
# spring.gorm.clickhouse.primary.tls-key=/path/client-key.pem

spring.gorm.clickhouse.replica.user=default
spring.gorm.clickhouse.replica.password=
spring.gorm.clickhouse.replica.addr=127.0.0.1:9000
spring.gorm.clickhouse.replica.db=default

# This instance resolves its address via service discovery. `addr` is a dummy
# on purpose — it is ignored because `service-name` is set, proving the address
# comes from the registered discovery backend (see discovery.go), not config.
spring.gorm.clickhouse.discovery.user=default
spring.gorm.clickhouse.discovery.password=
spring.gorm.clickhouse.discovery.addr=0.0.0.0:0
spring.gorm.clickhouse.discovery.db=default
spring.gorm.clickhouse.discovery.service-name=clickhouse-cluster
