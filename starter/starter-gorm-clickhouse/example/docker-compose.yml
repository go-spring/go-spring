services:
  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: starter-gorm-clickhouse
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:8123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q localhost:8123/ping || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 60
