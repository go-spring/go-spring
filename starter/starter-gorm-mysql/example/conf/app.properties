spring.gorm.mysql.primary.user=root
spring.gorm.mysql.primary.password=123456
spring.gorm.mysql.primary.addr=127.0.0.1:3306
spring.gorm.mysql.primary.db=test

spring.gorm.mysql.replica.user=root
spring.gorm.mysql.replica.password=123456
spring.gorm.mysql.replica.addr=127.0.0.1:3306
spring.gorm.mysql.replica.db=test

# This instance resolves its address via service discovery. `addr` is a dummy
# on purpose — it is ignored because `service-name` is set, proving the address
# comes from the registered discovery backend (see discovery.go), not config.
spring.gorm.mysql.discovery.user=root
spring.gorm.mysql.discovery.password=123456
spring.gorm.mysql.discovery.addr=0.0.0.0:0
spring.gorm.mysql.discovery.db=test
spring.gorm.mysql.discovery.service-name=mysql-cluster
