<body>
  <h1>BookMan</h1>
  <p>A Go-Spring example for HTTP routing, bean injection, service layering, dynamic configuration, and graceful shutdown.</p>
  <ul>
    <li><code>GET /books</code> lists books.</li>
    <li><code>GET /books/{isbn}</code> gets one book.</li>
    <li><code>POST /books</code> creates or updates a book.</li>
    <li><code>DELETE /books/{isbn}</code> deletes a book.</li>
  </ul>
</body>
