# MySQL (GORM) — default instance, backing the user & order repositories.
# Matches ./docker-compose.yml. Delete this block if you remove the DB repos.
spring.gorm.user=root
spring.gorm.password=123456
spring.gorm.addr=127.0.0.1:3306
spring.gorm.db=test
spring.gorm.charset=utf8mb4
spring.gorm.parseTime=true
spring.gorm.loc=Local

# Redis (go-redis) — default instance, used as a read-through cache for users.
# Matches ./docker-compose.yml. Delete this line if you remove the Redis cache.
spring.go-redis.addr=127.0.0.1:6379

# Transport servers — one block per RPC framework. Each server implements the
# gs.Server lifecycle and starts only when its controller bean is wired.
# Delete the blocks for protocols this service does not expose. kitex exposes
# both thrift and gRPC/protobuf variants side by side, each on its own port.
spring.grpc.server.addr=:9091
spring.thrift.server.addr=:9092
spring.dubbo.server.port=20000
spring.kitex.thrift.server.addr=:8888
spring.kitex.grpc.server.addr=:9095
spring.gozero.server.host=0.0.0.0
spring.gozero.server.port=8899

# stdlib net/http server (httpsvr) — serves the gs-http-gen IDL routes on the
# core SimpleHttpServer. It owns its own port; keep it distinct from every
# other transport server.
spring.http.server.addr=:8000

# WebSocket server (wssvr) — owns a dedicated http.Server on its own port
# rather than sharing the stdlib HTTP server. Upgrader tuning lives under
# ${spring.websocket}.
spring.websocket.server.addr=:8010

# Minimal HTTP servers (gin/echo/hertz) — IDL-free, each on its own port so
# they can run side by side. Each starter owns its engine and takes the listen
# address from config; the app only registers routes via a RouterRegister bean.
# Delete the block for any framework this service does not expose.
spring.gin.server.addr=:8001
spring.echo.server.addr=:8002
spring.hertz.server.addr=:8003

# goframe servers — one per protocol (grpc/http/tcp/ws), each on its own port.
# The svr adapters are dependency-light scaffolds; real goframe wiring is a TODO.
spring.goframe.grpc.server.addr=:9093
spring.goframe.http.server.addr=:8004
spring.goframe.tcp.server.addr=:9200
spring.goframe.ws.server.addr=:8011

# kratos servers — one per protocol (grpc/http/ws), each on its own port.
spring.kratos.grpc.server.addr=:9094
spring.kratos.http.server.addr=:8005
spring.kratos.ws.server.addr=:8012

# tRPC server — its own port.
spring.trpc.server.addr=:8100

# Custom logger settings
logging.logger.myLogger.type=RollingFileLogger
logging.logger.myLogger.level=info
logging.logger.myLogger.tag=_app_*,_biz_*
logging.logger.myLogger.dir=./logs
logging.logger.myLogger.file=GS_PROJECT_NAME.log
logging.logger.myLogger.layout.type=TextLayout
logging.logger.myLogger.async=true
logging.logger.myLogger.bufferSize=1000
