# --- Gateway (edge) ----------------------------------------------------------
spring.app.name=gateway

# The gateway owns its own port; disable the built-in Go-Spring HTTP server so
# only the gateway server and the actuator bind ports in this process.
spring.http.server.enabled=false
spring.gateway.server.addr=:9440

# --- Route: /api/** -> order service, discovered via Consul -------------------
# stripPrefix(1) turns /api/orders into /orders before forwarding. The upstream
# is lb://order, resolved through the "consul" discovery backend registered in
# main; no hard-coded order address.
spring.gateway.routes.orders.predicates.path=/api/**
spring.gateway.routes.orders.filters=stripPrefix(1)
spring.gateway.routes.orders.upstream.target=lb://order
spring.gateway.routes.orders.upstream.discovery=consul

# --- Observability ------------------------------------------------------------
spring.actuator.enabled=true
spring.actuator.addr=:9370

spring.observability.enable=true
spring.observability.service-name=gateway
spring.observability.trace.exporter=stdout
spring.observability.trace.sampler-ratio=1.0
spring.observability.metrics.exporter=prometheus
spring.observability.metrics.port=0
spring.observability.metrics.path=/metrics

# --- Graceful drain -----------------------------------------------------------
app.shutdown.pre-stop-delay=2s

# --- Logging ------------------------------------------------------------------
logging.appender.console.type=ConsoleAppender
logging.appender.console.layout.type=TextLayout
logging.logger.root.type=Logger
logging.logger.root.level=INFO
logging.logger.root.appenderRef.ref=console
