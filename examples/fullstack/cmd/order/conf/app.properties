# --- Order service (A) -------------------------------------------------------
spring.app.name=order

# The built-in Go-Spring HTTP server serves the *gs.HttpServeMux this app
# provides (the JWT-wrapped order mux). Distinct from gin (:8082) and the
# actuator (:9371) ports on this host.
spring.http.server.addr=:8081

# --- JWT resource server ------------------------------------------------------
# The "api" sub-key names the authenticator this app selects with
# gs.TagArg("api"). The HMAC secret matches internal/authsecret.Secret so the
# minted token verifies with no external identity provider.
spring.security.jwt.api.secret=fullstack-shared-secret
spring.security.jwt.api.roles-claim=roles
spring.security.jwt.api.required=true

# --- Distributed transaction (Saga) ------------------------------------------
# Enabled by default; turn on tracing so each step becomes an otel child span on
# the request's trace.
spring.transaction.saga.enabled=true
spring.transaction.saga.tracing=true

# --- Register into Consul so the gateway's lb://order route resolves this -----
spring.registry.consul.address=127.0.0.1:8500
spring.registry.consul.ttl=10s
spring.registry.consul.deregister-critical-after=30s
spring.registry.service-name=order
spring.registry.addr=127.0.0.1:8081
spring.registry.metadata.version=v1

# --- Config center: import the charge-fail toggle from Nacos ------------------
# "optional:" lets the service start before the data id exists; publishing
# fullstack.order.charge-fail=true later refreshes the bound gs.Dync field live,
# flipping the next order into the Saga compensation path.
spring.nacos.ip-addr=127.0.0.1
spring.nacos.port=8848
spring.app.imports=optional:nacos:127.0.0.1:8848/gs-fullstack-order?group=DEFAULT_GROUP&format=properties

# --- Observability ------------------------------------------------------------
spring.actuator.enabled=true
spring.actuator.addr=:9371

spring.observability.enable=true
spring.observability.service-name=order
spring.observability.trace.exporter=stdout
spring.observability.trace.sampler-ratio=1.0
spring.observability.metrics.exporter=prometheus
spring.observability.metrics.port=0
spring.observability.metrics.path=/metrics

# --- Graceful drain -----------------------------------------------------------
app.shutdown.pre-stop-delay=2s

# --- Logging ------------------------------------------------------------------
logging.appender.console.type=ConsoleAppender
logging.appender.console.layout.type=TextLayout
logging.logger.root.type=Logger
logging.logger.root.level=INFO
logging.logger.root.appenderRef.ref=console
