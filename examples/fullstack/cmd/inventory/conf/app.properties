# --- Inventory service (B) ---------------------------------------------------
spring.app.name=inventory

# gin owns the business port; disable the built-in Go-Spring HTTP server so there
# is no :9090 clash and gin's SimpleGinServer is the only main HTTP server.
spring.http.server.enabled=false
spring.gin.server.addr=:8082
spring.gin.server.health.enabled=true
spring.gin.server.health.path=/healthz

# --- Register into Consul so the order service can discover this instance -----
# service-name is the logical name order resolves via lb/discovery; addr is the
# connectable host:port advertised to callers.
spring.registry.consul.address=127.0.0.1:8500
spring.registry.consul.ttl=10s
spring.registry.consul.deregister-critical-after=30s
spring.registry.service-name=inventory
spring.registry.addr=127.0.0.1:8082
spring.registry.metadata.version=v1

# --- Observability: one management port for probes AND metrics ---------------
# Each process must bind a DISTINCT actuator port on this host (gateway :9370,
# order :9371, inventory :9372) — the multi-process port-allocation pitfall the
# reference app exists to surface.
spring.actuator.enabled=true
spring.actuator.addr=:9372

spring.observability.enable=true
spring.observability.service-name=inventory
spring.observability.trace.exporter=stdout
spring.observability.trace.sampler-ratio=1.0
spring.observability.metrics.exporter=prometheus
spring.observability.metrics.port=0
spring.observability.metrics.path=/metrics

# --- Graceful drain -----------------------------------------------------------
# On SIGTERM readiness flips to OUT_OF_SERVICE and the framework waits this long
# before stopping servers, so in-flight compensation calls from A still complete.
app.shutdown.pre-stop-delay=2s

# --- Logging ------------------------------------------------------------------
logging.appender.console.type=ConsoleAppender
logging.appender.console.layout.type=TextLayout
logging.logger.root.type=Logger
logging.logger.root.level=INFO
logging.logger.root.appenderRef.ref=console
