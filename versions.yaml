#
# versions.yaml — the single source of truth for the third-party dependency
# versions Go-Spring has "blessed". It plays the role Spring's BOM plays: pin
# the versions of high-frequency shared dependencies so the 60+ independent
# go.mod files in this workspace stay aligned and don't drift apart.
#
# This file is DESCRIPTIVE for tooling, not enforced by the build. Run
# `gs versions check` to report modules whose require versions deviate from
# this baseline, `gs versions diff` for the per-module detail, and
# `gs versions apply <module>` to align a single module's go.mod.
#
# Internal modules (go-spring.org/...) are intentionally absent: the workspace
# resolves them through go.work, so they must never be pinned via require.

# Blessed Go toolchain version.
go: "1.26"

# Versions known to break the toolchain or codegen. `gs versions check` flags a
# module (or this file) that lands on a disabled version.
disabled:
  go:
    # go1.26.0's runtime.Version() carries an "-X:jsonv2" build suffix that
    # crashes protoc-gen-go-triple and other codegen tools that parse it.
    - "1.26.0"

# Blessed third-party versions, keyed by module path. Covers the dependencies
# shared across many modules (observability, RPC, ORM, cache, testing, config).
dependencies:
  # OpenTelemetry — keep the whole family on one minor to avoid API skew.
  go.opentelemetry.io/otel: v1.43.0
  go.opentelemetry.io/otel/trace: v1.43.0
  go.opentelemetry.io/otel/metric: v1.43.0
  go.opentelemetry.io/otel/sdk: v1.43.0
  go.opentelemetry.io/otel/sdk/metric: v1.43.0

  # gRPC / protobuf.
  google.golang.org/grpc: v1.80.0
  google.golang.org/protobuf: v1.36.11

  # Persistence and cache.
  gorm.io/gorm: v1.31.1
  github.com/redis/go-redis/v9: v9.21.0

  # Testing.
  github.com/stretchr/testify: v1.11.1

  # Config / serialization.
  gopkg.in/yaml.v3: v3.0.1

  # CLI and golang.org/x commons.
  github.com/spf13/cobra: v1.9.1
  golang.org/x/mod: v0.37.0
  golang.org/x/sync: v0.20.0
  golang.org/x/sys: v0.44.0
