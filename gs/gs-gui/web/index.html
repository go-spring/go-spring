<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Go-Spring · Create Project</title>
  <style>
    :root { --fg:#1f2328; --muted:#656d76; --accent:#2da44e; --border:#d0d7de; --bg:#f6f8fa; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; color:var(--fg); background:#fff; }
    .wrap { max-width:760px; margin:0 auto; padding:40px 24px; }
    h1 { font-size:22px; margin:0 0 4px; }
    p.sub { color:var(--muted); margin:0 0 28px; }
    label { display:block; font-weight:600; margin:18px 0 6px; }
    input, select { width:100%; padding:8px 10px; font-size:14px; border:1px solid var(--border); border-radius:6px; background:#fff; color:var(--fg); }
    input:focus, select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(45,164,78,.2); }
    .hint { color:var(--muted); font-size:12px; margin-top:4px; }
    button { margin-top:24px; padding:9px 18px; font-size:14px; font-weight:600; color:#fff; background:var(--accent); border:0; border-radius:6px; cursor:pointer; }
    button:disabled { opacity:.6; cursor:default; }
    pre { margin-top:24px; padding:14px; background:#0d1117; color:#e6edf3; border-radius:6px; min-height:120px; max-height:420px; overflow:auto; white-space:pre-wrap; word-break:break-all; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Create a Go-Spring project</h1>
    <p class="sub">Fill in the fields, then let <code>gs init</code> scaffold your project.</p>

    <form id="form">
      <label for="module">Module path</label>
      <input id="module" name="module" placeholder="github.com/you/hello" autocomplete="off" required>
      <div class="hint">Go module path, e.g. <code>github.com/you/hello</code>. The last segment becomes the project directory.</div>

      <label for="lang">Documentation language</label>
      <select id="lang" name="lang">
        <option value="zh">中文 (zh)</option>
        <option value="en">English (en)</option>
      </select>

      <button id="submit" type="submit">Create project</button>
    </form>

    <pre id="log"></pre>
  </div>

  <script>
    const form = document.getElementById('form');
    const submit = document.getElementById('submit');
    const logEl = document.getElementById('log');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const module = document.getElementById('module').value.trim();
      const lang = document.getElementById('lang').value;
      if (!module) return;

      submit.disabled = true;
      logEl.style.display = 'block';
      logEl.textContent = '';

      try {
        const res = await fetch('/api/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ module, lang }),
        });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        for (;;) {
          const { value, done } = await reader.read();
          if (done) break;
          logEl.textContent += decoder.decode(value, { stream: true });
          logEl.scrollTop = logEl.scrollHeight;
        }
      } catch (err) {
        logEl.textContent += '\n[gs-gui] request failed: ' + err;
      } finally {
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
