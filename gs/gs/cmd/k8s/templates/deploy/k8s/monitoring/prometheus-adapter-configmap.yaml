# Sample prometheus-adapter ConfigMap. Apply it into the namespace where
# prometheus-adapter runs (usually "monitoring") and point the adapter's
# --config at it. It turns an actuator counter scraped by Prometheus (via
# servicemonitor.yaml) into a per-pod custom metric on custom.metrics.k8s.io.
#
# This configures CLUSTER MONITORING, not the app, so it is intentionally NOT
# listed in base/kustomization.yaml — apply it separately.
#
# Chain: actuator /metrics -> ServiceMonitor -> Prometheus -> prometheus-adapter
#        -> custom.metrics.k8s.io -> HPA (see hpa-custom-metric.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: adapter-config
  namespace: monitoring
data:
  config.yaml: |
    rules:
      - seriesQuery: 'http_requests_total{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace: {resource: "namespace"}
            pod: {resource: "pod"}
        name:
          matches: "^(.*)_total$"
          as: "http_requests_per_second"
        metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[2m])) by (<<.GroupBy>>)'
