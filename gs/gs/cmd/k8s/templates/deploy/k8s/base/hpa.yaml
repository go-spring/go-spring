apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: GS_APP_NAME
  labels:
    app.kubernetes.io/name: GS_APP_NAME
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: GS_APP_NAME
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # To scale on a custom/application metric exposed via the ServiceMonitor
    # (e.g. requests-per-second scraped from /metrics), add a Pods metric here
    # and install the prometheus-adapter. Left commented as a starting point.
    # - type: Pods
    #   pods:
    #     metric:
    #       name: http_requests_per_second
    #     target:
    #       type: AverageValue
    #       averageValue: "100"
