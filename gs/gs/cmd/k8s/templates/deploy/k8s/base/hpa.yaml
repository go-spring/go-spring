apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: GS_APP_NAME
  labels:
    app.kubernetes.io/name: GS_APP_NAME
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: GS_APP_NAME
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # To scale on a custom/application metric exposed via the ServiceMonitor
    # (e.g. requests-per-second scraped from /metrics), install prometheus-adapter
    # and apply the samples in ../monitoring (prometheus-adapter-configmap.yaml +
    # hpa-custom-metric.yaml, which replaces this HPA). Left as CPU-only here.
