# Cloud-native profile for GS_PROJECT_NAME, activated by spring.profiles.active=k8s
# (the Deployment sets GS_SPRING_PROFILES_ACTIVE=k8s). Values here override
# conf/app.properties only when this profile is active, so local development
# keeps its text-to-file logging default.

# Structured JSON logs to stdout. Kubernetes log collectors (Fluent Bit,
# Filebeat, ...) parse container stdout; writing to a file inside the container
# would hide logs from them. This redefines the base logger as a console logger
# with a JSON layout; the base file-specific keys (dir/file/async) are ignored.
logging.logger.myLogger.type=ConsoleLogger
logging.logger.myLogger.layout.type=JSONLayout

# Graceful drain windows. On SIGTERM the app flips readiness to OUT_OF_SERVICE,
# waits pre-stop-delay so the endpoint controller stops routing new traffic,
# then stops servers within timeout. These align with the Deployment's
# preStop sleep and terminationGracePeriodSeconds. Set via the profile file
# (not env) because the GS_ env->property mapping cannot produce hyphens.
app.shutdown.pre-stop-delay=5s
app.shutdown.timeout=30s

# Downward API labels file mount path (see the labels volume in deployment.yaml).
# podinfo.PodInfo binds this to read pod labels at runtime.
pod.labels.path=/etc/podinfo/labels
